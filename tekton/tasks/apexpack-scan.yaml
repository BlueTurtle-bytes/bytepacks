apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-scan
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack CVE scan"
    tekton.dev/description: >-
      Scans the SBOM produced by apexpack-build for CVEs using grype.
      Exits 1 if vulnerabilities at or above FAIL_ON severity are found.
      Upload SARIF output to GitHub Code Scanning or a security tool.
spec:
  params:
    - name: SBOM_PATH
      description: "Path to the SPDX SBOM file to scan."
    - name: FAIL_ON
      description: "Minimum severity that fails the pipeline: critical, high, medium, low, none."
      default: "high"
    - name: FORMAT
      description: "Output format: table, json, sarif."
      default: "table"
    - name: SOFT_FAIL
      description: "When true, write fail result but exit 0 so the pipeline can continue to auto-patch."
      default: "false"

  workspaces:
    - name: output
      description: "Where the scan report is written."
    - name: tls-ca
      description: "Optional Secret with a corporate CA cert (key: ca-bundle.crt) for SSL inspection proxies."
      optional: true

  results:
    - name: SCAN_RESULT
      description: "pass or fail based on CVE findings."

  steps:
    - name: scan
      image: apexpack:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: GRYPE_DB_CACHE_DIR
          value: "/tmp/grype-db"
      script: |
        #!/bin/sh

        OUTPUT_FILE="$(workspaces.output.path)/scan-results.$(params.FORMAT)"

        if [ "$(workspaces.tls-ca.bound)" = "true" ]; then
          export SSL_CERT_FILE="$(workspaces.tls-ca.path)/ca-bundle.crt"
        fi

        # Normalize SBOM version strings before scanning.
        # Grype can only correlate packages when versions are in standard APK
        # format ("3.6.2-r5"). Without this, packages like openssl ("openssl-3.6.2")
        # or brotli ("v1.2.0") are missed by the CVE database lookup.
        NORMALIZED=$(apexpacks normalize-sbom "$(params.SBOM_PATH)")
        SBOM="sbom:$NORMALIZED"

        echo "=== CVE Scan Results ==="
        grype "$SBOM" --output table 2>&1 || true
        echo "========================"

        if grype "$SBOM" \
            --fail-on $(params.FAIL_ON) \
            --output $(params.FORMAT) \
            --file "$OUTPUT_FILE" \
            2>/dev/null; then
          printf "pass" > $(results.SCAN_RESULT.path)
          echo "✓ No CVEs found at or above $(params.FAIL_ON) severity."
        else
          printf "fail" > $(results.SCAN_RESULT.path)
          echo "✗ CVEs found at or above $(params.FAIL_ON) severity. Full report: $OUTPUT_FILE"
          if [ "$(params.SOFT_FAIL)" = "true" ]; then
            echo "→ AUTO_PATCH enabled — continuing to apply patches."
          else
            rm -f "$NORMALIZED"
            exit 1
          fi
        fi

        rm -f "$NORMALIZED"
