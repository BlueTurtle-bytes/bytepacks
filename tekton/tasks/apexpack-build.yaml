apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-build
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack build"
    tekton.dev/description: >-
      Builds a minimal, secure OCI image from source using melange and apko.
      Reads language profiles from a cloned git workspace.
      Requires a privileged security context for melange's bubblewrap sandbox.
spec:
  params:
    - name: IMAGE
      description: "Full OCI image reference to produce (e.g. ghcr.io/myorg/myapp:v1.0.0)."
    - name: VERSION
      description: "Version string embedded in the APK package."
      default: "0.0.1"
    - name: RUNTIME
      description: "Language runtime profile to use. If empty, auto-detection runs."
      default: ""
    - name: PROJECT_NAME
      description: "Override the project name. Defaults to the source directory basename."
      default: ""

  workspaces:
    - name: source
      description: "Cloned source code to build."
    - name: profiles
      description: "Cloned profiles repository. Profiles are read from <profiles-workspace>/profiles/."
    - name: output
      description: "Where the OCI tarball, APK package, SBOM, and signing keys are written."
    - name: registry-credentials
      description: "Docker config.json for registry push (optional)."
      optional: true
      mountPath: /home/nonroot/.docker
    - name: tls-ca
      description: "Optional Secret with a corporate CA cert (key: ca-bundle.crt) for SSL inspection proxies."
      optional: true

  results:
    - name: IMAGE_TARBALL
      description: "Path to the built OCI image tarball in the output workspace."
    - name: SBOM_PATH
      description: "Path to the SPDX SBOM in the output workspace."
    - name: APK_PATH
      description: "Path to the built APK package in the output workspace."

  stepTemplate:
    securityContext:
      privileged: true   # melange needs bubblewrap; remove if node has user namespaces enabled

  steps:
    - name: build
      image: apexpack:latest
      imagePullPolicy: IfNotPresent
      script: |
        #!/bin/sh
        set -e

        # bwrap --unshare-user fails when the container runtime uses userns-remap
        # (Docker on Colima QEMU). We are already root in a privileged container so
        # user-namespace isolation is redundant. Shadow the real bwrap with a wrapper
        # that strips the user-namespace flags before forwarding the call.
        # melange calls /usr/bin/bwrap by absolute path, so PATH shadowing doesn't work.
        # Use mount --bind to replace the binary directly.
        # The wrapper handles two cases:
        #   1. melange's capability pre-check: bwrap --unshare-user <cmd> with no mounts -> exit 0
        #   2. real build call: strip user-namespace flags (blocked by Docker userns-remap on Colima)
        cp /usr/bin/bwrap /tmp/bwrap-real
        cat > /tmp/bwrap-wrapper << 'BWRAP_WRAPPER'
        #!/bin/sh
        has_mounts=0
        for a in "$@"; do
          case "$a" in --bind|--ro-bind|--dev-bind|--proc|--dev|--tmpfs) has_mounts=1; break;; esac
        done
        if [ "$has_mounts" = "0" ]; then exit 0; fi
        args=""
        skip_next=0
        for a in "$@"; do
          if [ "$skip_next" = "1" ]; then skip_next=0; continue; fi
          case "$a" in
            --unshare-user) ;;
            --unshare-all) args="$args --unshare-pid --unshare-net --unshare-uts --unshare-ipc" ;;
            --uid|--gid) skip_next=1 ;;
            *) args="$args $a" ;;
          esac
        done
        exec /tmp/bwrap-real $args
        BWRAP_WRAPPER
        chmod 755 /tmp/bwrap-wrapper
        mount --bind /tmp/bwrap-wrapper /usr/bin/bwrap

        if [ -d "$(workspaces.profiles.path)/profiles" ]; then
          PROFILES_DIR="$(workspaces.profiles.path)/profiles"
        else
          PROFILES_DIR="$(workspaces.profiles.path)"
        fi

        RUNTIME_FLAG=""
        if [ -n "$(params.RUNTIME)" ]; then
          RUNTIME_FLAG="--runtime $(params.RUNTIME)"
        fi

        NAME_FLAG=""
        if [ -n "$(params.PROJECT_NAME)" ]; then
          NAME_FLAG="--project-name $(params.PROJECT_NAME)"
        fi

        TLS_CA_FLAG=""
        if [ "$(workspaces.tls-ca.bound)" = "true" ]; then
          CA_FILE="$(workspaces.tls-ca.path)/ca-bundle.crt"
          # Pass the CA to apexpack so it lands in the build sandbox for the
          # tls_ca_pre_step (Java JVM truststore, .NET, etc.).
          # Do NOT set SSL_CERT_FILE here — melange fetches Wolfi packages without
          # needing it, and corporate CA certs with non-standard ASN.1 encoding
          # crash Go's Linux x509 PEM parser (SIGSEGV / growslice) when set.
          TLS_CA_FLAG="--tls-extra-ca $CA_FILE"
        fi

        apexpack build \
          $(workspaces.source.path) \
          --tag $(params.IMAGE) \
          --version $(params.VERSION) \
          --output $(workspaces.output.path) \
          --profiles-dir "$PROFILES_DIR" \
          $RUNTIME_FLAG \
          $NAME_FLAG \
          $TLS_CA_FLAG

        # Emit result paths for downstream tasks.
        SOURCE_BASE=$(basename $(workspaces.source.path))
        ARCH=$(uname -m)
        printf "%s" "$(workspaces.output.path)/${SOURCE_BASE}.tar"                   > $(results.IMAGE_TARBALL.path)
        printf "%s" "$(workspaces.output.path)/sbom-${ARCH}.spdx.json"              > $(results.SBOM_PATH.path)
        printf "%s" "$(workspaces.output.path)/packages/${ARCH}/*.apk"              > $(results.APK_PATH.path)

        echo ""
        echo "Build complete:"
        ls -lh $(workspaces.output.path)/
