apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-build
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack build"
    tekton.dev/description: >-
      Builds a minimal, secure OCI image from source using melange and apko.
      Reads language profiles from a cloned git workspace.
spec:
  params:
    - name: IMAGE
      description: "Full OCI image reference to produce (e.g. registry.corp.com/myteam/myapp:v1.0.0)."
    - name: VERSION
      description: "Version string embedded in the APK package."
      default: "0.0.1"
    - name: RUNTIME
      description: "Language runtime profile to use. If empty, auto-detection runs."
      default: ""
    - name: PROJECT_NAME
      description: "Override the project name. Defaults to the source directory basename."
      default: ""
    - name: APEXPACK_IMAGE
      description: "apexpack container image to use as the build step. Override to pin a specific version or use your Artifactory mirror."
      default: "apexpack:latest"

  workspaces:
    - name: source
      description: "Cloned source code to build."
    - name: profiles
      description: "Cloned profiles repository. Profiles are read from <profiles-workspace>/profiles/."
    - name: output
      description: "Where the OCI tarball, APK package, SBOM, and signing keys are written."
    - name: registry-credentials
      description: "Docker config.json for registry push (optional)."
      optional: true
      mountPath: /home/nonroot/.docker
    - name: tls-ca
      description: "Optional Secret with a corporate CA cert (key: ca-bundle.crt) for SSL inspection proxies."
      optional: true

  results:
    - name: PUSHED_IMAGE
      description: "Image reference that was pushed to the registry by apko publish."
    - name: SBOM_PATH
      description: "Path to the SPDX SBOM in the output workspace."
    - name: APK_PATH
      description: "Path to the built APK package in the output workspace."

  stepTemplate:
    securityContext:
      privileged: true   # melange needs bubblewrap
      runAsUser: 0       # must be root to retain effective capabilities (Wolfi image defaults to nonroot)

  steps:
    - name: build
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      env:
        # Maven Artifactory mirror credentials. Sourced from the 'artifactory-creds' secret
        # when it exists; optional so pods run fine without Artifactory (local / OSS builds).
        # Create: kubectl create secret generic artifactory-creds \
        #           --from-literal=MAVEN_MIRROR_USER=<user> \
        #           --from-literal=MAVEN_MIRROR_PASSWORD=<token>
        - name: MAVEN_MIRROR_USER
          valueFrom:
            secretKeyRef:
              name: artifactory-creds
              key: MAVEN_MIRROR_USER
              optional: true
        - name: MAVEN_MIRROR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artifactory-creds
              key: MAVEN_MIRROR_PASSWORD
              optional: true
        # NuGet Artifactory feed credentials. Sourced from the 'nuget-creds' secret when present.
        # Create: kubectl create secret generic nuget-creds \
        #           --from-literal=NUGET_MIRROR_USER=<user> \
        #           --from-literal=NUGET_MIRROR_PASSWORD=<token>
        - name: NUGET_MIRROR_USER
          valueFrom:
            secretKeyRef:
              name: nuget-creds
              key: NUGET_MIRROR_USER
              optional: true
        - name: NUGET_MIRROR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nuget-creds
              key: NUGET_MIRROR_PASSWORD
              optional: true
      script: |
        #!/bin/sh
        set -e

        if [ -d "$(workspaces.profiles.path)/profiles" ]; then
          PROFILES_DIR="$(workspaces.profiles.path)/profiles"
        else
          PROFILES_DIR="$(workspaces.profiles.path)"
        fi

        RUNTIME_FLAG=""
        if [ -n "$(params.RUNTIME)" ]; then
          RUNTIME_FLAG="--runtime $(params.RUNTIME)"
        fi

        NAME_FLAG=""
        if [ -n "$(params.PROJECT_NAME)" ]; then
          NAME_FLAG="--project-name $(params.PROJECT_NAME)"
        fi

        TLS_CA_FLAG=""
        if [ "$(workspaces.tls-ca.bound)" = "true" ]; then
          CA_FILE="$(workspaces.tls-ca.path)/ca-bundle.crt"
          TLS_CA_FLAG="--tls-extra-ca $CA_FILE"
        fi

        apexpack build \
          $(workspaces.source.path) \
          --tag $(params.IMAGE) \
          --version $(params.VERSION) \
          --output $(workspaces.output.path) \
          --profiles-dir "$PROFILES_DIR" \
          $RUNTIME_FLAG \
          $NAME_FLAG \
          $TLS_CA_FLAG

        ARCH=$(uname -m)
        CTX="$(workspaces.source.path)/.apexpack/context.json"
        printf "%s" "$(jq -r '.pushed_image // ""' "$CTX")"              > $(results.PUSHED_IMAGE.path)
        printf "%s" "$(workspaces.output.path)/sbom-${ARCH}.spdx.json"   > $(results.SBOM_PATH.path)
        printf "%s" "$(workspaces.output.path)/packages/${ARCH}/*.apk"   > $(results.APK_PATH.path)

        echo ""
        echo "Build complete:"
        ls -lh $(workspaces.output.path)/
