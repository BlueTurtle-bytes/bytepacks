# ArgoCD Application — syncs all apexpack Tekton resources to the cluster.
#
# What this does:
#   ArgoCD watches your git repo every 3 minutes (or on webhook push).
#   When it detects a change in tekton/ (e.g. a new image digest committed
#   by the release workflow), it runs:
#     kubectl apply -f tekton/tasks/
#     kubectl apply -f tekton/pipelines/
#     kubectl apply -f tekton/config/
#
# Deploy this once:
#   kubectl apply -f tekton/config/argocd-app.yaml
#
# After that, all Tekton resource updates are automatic.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apexpack-tekton
  namespace: argocd
  # Finalizer ensures ArgoCD cleans up Tekton resources if this app is deleted.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Point at your apexpack repo.
    repoURL: https://github.com/yourorg/apexpack
    targetRevision: main
    # Only watch the tekton/ directory — changes elsewhere don't trigger a sync.
    path: tekton

  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines

  syncPolicy:
    # Automatically sync when git changes are detected.
    automated:
      prune: true      # remove Tekton resources deleted from git
      selfHeal: true   # re-apply if someone manually edits a task in the cluster

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true   # only apply resources that actually changed

    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
