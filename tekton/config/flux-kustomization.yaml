# Flux Kustomization — syncs apexpack Tekton resources.
# Use this instead of argocd-app.yaml if your cluster uses Flux.
#
# Deploy:
#   kubectl apply -f tekton/config/flux-kustomization.yaml
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: apexpack
  namespace: flux-system
spec:
  interval: 1m        # check for git changes every minute
  url: https://github.com/yourorg/apexpack
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apexpack-tekton
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: apexpack
  path: ./tekton          # only watch the tekton/ directory
  prune: true             # remove deleted resources
  targetNamespace: tekton-pipelines
  timeout: 2m
