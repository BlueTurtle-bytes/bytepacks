apiVersion: v1
kind: ConfigMap
metadata:
  name: apexpack-profiles
  namespace: tekton-pipelines
  annotations:
    description: |
      Language profiles for apexpack. Update these to change how each language
      is detected and built without redeploying the apexpack image.
      Apply with: kubectl apply -f tekton/config/profiles-configmap.yaml
      Or update from profiles/ dir: kubectl create configmap apexpack-profiles \
        --from-file=profiles/ --dry-run=client -o yaml | kubectl apply -f -
data:
  golang.yaml: |
    # Go language profile
    # Detected when: go.mod exists in the source directory
    # Builds with: go build (CGO disabled, trimpath for reproducibility)
    # Runtime image: Wolfi base + ca-certificates-bundle only
    
    runtime: golang
    version: "1"
    description: Go application (gin, echo, chi, stdlib, gRPC)
    
    detect:
      files:
        - go.mod
      content:
        - file: go.mod
          contains: "^module "
          boost-confidence: 0.05
        - file: go.sum
          contains: "gin-gonic"
          boost-confidence: 0.02
          framework: gin
        - file: go.sum
          contains: "labstack/echo"
          boost-confidence: 0.02
          framework: echo
        - file: go.sum
          contains: "gofiber/fiber"
          boost-confidence: 0.02
          framework: fiber
        - file: go.sum
          contains: "google.golang.org/grpc"
          boost-confidence: 0.02
          framework: grpc
        - file: go.sum
          contains: "connectrpc.com/connect"
          boost-confidence: 0.02
          framework: connect
    
      confidence: 0.85
    
    build:
      dependencies:
        - busybox   # provides /bin/sh needed by melange to run the pipeline script
        - go
        - build-base
        - git
      command: |
        # ${{targets.destdir}} is melange's variable for the package output directory.
        # Files placed here are packaged into the APK, preserving directory structure.
        # /usr/bin/app → installs as /usr/bin/app in the final image.
        mkdir -p ${{targets.destdir}}/usr/bin
        if [ -f "main.go" ]; then
          go build -o ${{targets.destdir}}/usr/bin/app .
        elif [ -d "cmd" ]; then
          CMD=$(ls cmd/ | head -1)
          go build -o ${{targets.destdir}}/usr/bin/app ./cmd/$CMD
        else
          echo "ERROR: no main package found — set build.command in your project config"
          exit 1
        fi
      env:
        CGO_ENABLED: "0"
        GOFLAGS: "-trimpath"
        GOPATH: "/home/build/go"
    
    image:
      packages:
        - ca-certificates-bundle=20260413-r0
      entrypoint: /usr/bin/app
      run-as: 65532
      ports:
        - "8080"
    

  java.yaml: |
    # Java language profile
    # Detects Maven projects (pom.xml) and Gradle projects (build.gradle / build.gradle.kts)
    # Supports: Spring Boot, Quarkus, Micronaut, plain Java
    # Runtime image: Wolfi + openjdk-21-jre (JRE only — smaller attack surface than JDK)
    
    runtime: java
    version: "1"
    description: Java application (Maven or Gradle, Spring Boot, Quarkus)
    
    detect:
      files:
        - pom.xml
        - build.gradle
        - build.gradle.kts
      content:
        - file: pom.xml
          contains: "spring-boot"
          boost-confidence: 0.05
          framework: spring-boot
        - file: pom.xml
          contains: "quarkus"
          boost-confidence: 0.05
          framework: quarkus
        - file: pom.xml
          contains: "micronaut"
          boost-confidence: 0.05
          framework: micronaut
        - file: build.gradle
          contains: "spring-boot"
          boost-confidence: 0.05
          framework: spring-boot
        - file: build.gradle
          contains: "quarkus"
          boost-confidence: 0.05
          framework: quarkus
      confidence: 0.85
    
    build:
      # openjdk-21 provides the JDK needed to compile.
      # maven is the build tool. build-base provides make, gcc etc.
      dependencies:
        - busybox
        - openjdk-21
        - maven
        - build-base
        - git
      command: |
        mkdir -p /home/build/output/app
        if [ -f "pom.xml" ]; then
          mvn package -DskipTests -B -q
          cp target/*.jar /home/build/output/app/app.jar
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          chmod +x ./gradlew
          ./gradlew build -x test --no-daemon -q
          cp build/libs/*-all.jar /home/build/output/app/app.jar 2>/dev/null || \
            cp build/libs/*.jar /home/build/output/app/app.jar
        else
          echo "ERROR: no pom.xml or build.gradle found" && exit 1
        fi
      env:
        JAVA_HOME: "/usr/lib/jvm/java-21-openjdk"
        MAVEN_OPTS: "-Xmx512m -XX:+UseContainerSupport"
        GRADLE_OPTS: "-Xmx512m -XX:+UseContainerSupport"
    
    image:
      # JRE only — not JDK. No compiler in the final image reduces attack surface.
      packages:
        - openjdk-21-jre
        - ca-certificates-bundle=20260413-r0
      # java -jar is the entrypoint. The JAR path is passed via cmd.
      entrypoint: java
      cmd:
        - "-jar"
        - "/app/app.jar"
      run-as: 65532
      ports:
        - "8080"
      env:
        JAVA_HOME: "/usr/lib/jvm/java-21-openjdk"
        JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    

  dotnet.yaml: |
    # .NET language profile
    # Detects: *.csproj (single project), *.sln (solution / monorepo)
    # Supports: ASP.NET Core, Minimal API, Worker Service, Console apps
    # Runtime image: Wolfi + aspnetcore-8-runtime (ASP.NET runtime, not SDK)
    
    runtime: dotnet
    version: "1"
    description: .NET application (ASP.NET Core, Minimal API, Worker Service)
    
    detect:
      # Glob patterns — .csproj and .sln filenames are always project-specific.
      patterns:
        - "*.csproj"
        - "*.sln"
      content:
        - file: global.json
          contains: "dotnet"
          boost-confidence: 0.05
        - file: Directory.Packages.props
          contains: "AspNetCore"
          boost-confidence: 0.05
          framework: aspnetcore
        - file: Directory.Packages.props
          contains: "MassTransit"
          boost-confidence: 0.03
          framework: masstransit
        - file: Directory.Packages.props
          contains: "Orleans"
          boost-confidence: 0.03
          framework: orleans
      confidence: 0.85
    
    build:
      # dotnet-8-sdk includes the compiler, NuGet restore, and publish tooling.
      dependencies:
        - busybox
        - dotnet-8-sdk
        - build-base
        - git
      # dotnet publish produces a self-contained output directory.
      # /home/build/output/app is where apko will pick up the published files.
      command: |
        dotnet restore
        dotnet publish -c Release -o /home/build/output/app
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: "1"
        DOTNET_NOLOGO: "1"
        NUGET_PACKAGES: "/home/build/.nuget/packages"
    
    image:
      # aspnetcore-8-runtime is the ASP.NET Core runtime — no SDK, no compiler.
      # Much smaller than dotnet-8-sdk and has a smaller CVE surface.
      packages:
        - aspnetcore-8-runtime
        - ca-certificates-bundle=20260413-r0
        - icu-libs
      # The entrypoint is the published DLL.
      # apexpack sets this to /app/<ProjectName>.dll at build time.
      entrypoint: /usr/bin/dotnet
      cmd:
        - "/app/app.dll"
      run-as: 65532
      ports:
        - "8080"
      env:
        ASPNETCORE_URLS: "http://+:8080"
        DOTNET_RUNNING_IN_CONTAINER: "true"
        DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"
    

  node.yaml: |
    # Node.js language profile
    # Detects: package.json
    # Supports: Express, Fastify, NestJS, Next.js, plain Node
    # Package managers: npm (default), yarn, pnpm
    # Runtime image: Wolfi + nodejs (no npm — smaller final image)
    
    runtime: node
    version: "1"
    description: Node.js application (Express, Fastify, NestJS, Next.js)
    
    detect:
      files:
        - package.json
      content:
        - file: package.json
          contains: "\"next\""
          boost-confidence: 0.05
          framework: nextjs
        - file: package.json
          contains: "\"@nestjs/core\""
          boost-confidence: 0.05
          framework: nestjs
        - file: package.json
          contains: "\"express\""
          boost-confidence: 0.03
          framework: express
        - file: package.json
          contains: "\"fastify\""
          boost-confidence: 0.03
          framework: fastify
        - file: package.json
          contains: "\"hono\""
          boost-confidence: 0.03
          framework: hono
        - file: package.json
          contains: "\"@remix-run/node\""
          boost-confidence: 0.03
          framework: remix
      confidence: 0.85
    
    build:
      # nodejs and npm are needed to install dependencies and run the build.
      # python3 and build-base are needed for native Node addons (node-gyp).
      dependencies:
        - busybox
        - nodejs
        - npm
        - python3
        - build-base
        - git
      # npm ci installs exact versions from package-lock.json (reproducible).
      # npm run build compiles TypeScript, bundles assets, etc.
      # The dist/ or build/ output is copied to /home/build/output/app/
      command: |
        npm ci --prefer-offline
        npm run build --if-present
        mkdir -p /home/build/output/app
        cp -r . /home/build/output/app/
        rm -rf /home/build/output/app/node_modules
        cd /home/build/output/app && npm ci --omit=dev --prefer-offline
      env:
        NODE_ENV: "production"
        NPM_CONFIG_CACHE: "/home/build/.npm"
        CI: "true"
    
    image:
      # Only nodejs runtime — no npm, no build tools in the final image.
      packages:
        - nodejs
        - ca-certificates-bundle=20260413-r0
      entrypoint: node
      cmd:
        - "/app/server.js"
      run-as: 65532
      ports:
        - "3000"
      env:
        NODE_ENV: "production"
        PORT: "3000"
    

  python.yaml: |
    # Python language profile
    # Detects: requirements.txt, pyproject.toml, Pipfile, setup.py
    # Supports: FastAPI, Django, Flask, plain Python scripts
    # Package managers: pip (default), poetry, pdm, pipenv
    # Runtime image: Wolfi + python-3.12
    
    runtime: python
    version: "1"
    description: Python application (FastAPI, Django, Flask, uvicorn)
    
    detect:
      files:
        - requirements.txt
        - pyproject.toml
        - Pipfile
        - setup.py
      content:
        - file: requirements.txt
          contains: "fastapi"
          boost-confidence: 0.04
          framework: fastapi
        - file: requirements.txt
          contains: "django"
          boost-confidence: 0.04
          framework: django
        - file: requirements.txt
          contains: "flask"
          boost-confidence: 0.04
          framework: flask
        - file: requirements.txt
          contains: "aiohttp"
          boost-confidence: 0.03
          framework: aiohttp
        - file: pyproject.toml
          contains: "fastapi"
          boost-confidence: 0.04
          framework: fastapi
        - file: pyproject.toml
          contains: "django"
          boost-confidence: 0.04
          framework: django
        - file: pyproject.toml
          contains: "flask"
          boost-confidence: 0.04
          framework: flask
    
      confidence: 0.85
    
    build:
      # python-3.12 and py3-pip are needed to install dependencies.
      # build-base is needed for packages that compile C extensions (e.g. psycopg2).
      dependencies:
        - busybox
        - python-3.12
        - py3-pip
        - build-base
        - git
      # Install all dependencies from requirements.txt.
      # --no-cache-dir keeps the image smaller (no pip download cache).
      # The application source is copied to /home/build/output/app/
      command: |
        pip install --no-cache-dir -r requirements.txt --target /home/build/output/app/deps
        cp -r . /home/build/output/app/src
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        PIP_NO_CACHE_DIR: "1"
        PIP_DISABLE_PIP_VERSION_CHECK: "1"
    
    image:
      packages:
        - python-3.12
        - ca-certificates-bundle=20260413-r0
      # python3 -m uvicorn is the recommended way to run FastAPI / ASGI apps.
      # For Django / Flask use: python3 -m gunicorn
      entrypoint: python3
      cmd:
        - "-m"
        - "uvicorn"
        - "main:app"
        - "--host=0.0.0.0"
        - "--port=8000"
      run-as: 65532
      ports:
        - "8000"
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        PYTHONPATH: "/app/deps:/app/src"
    

  webserver.yaml: |
    # Webserver / Static site profile
    # Detects: index.html (plain static), or SPA build markers (vite.config.*, angular.json)
    # Supports: Plain HTML, React/Vue/Svelte SPA (Vite, CRA), Angular, Hugo, Jekyll
    # Runtime image: Wolfi + nginx (serves static files)
    
    runtime: webserver
    version: "1"
    description: Static site or SPA served by nginx (React, Vue, Angular, plain HTML)
    
    detect:
      files:
        - index.html
        - vite.config.ts
        - vite.config.js
        - angular.json
        - hugo.toml
        - hugo.yaml
        - _config.yml
      content:
        - file: package.json
          contains: "\"@angular/core\""
          boost-confidence: 0.05
          framework: angular
        - file: package.json
          contains: "\"vite\""
          boost-confidence: 0.05
          framework: vite
        - file: package.json
          contains: "\"react\""
          boost-confidence: 0.03
          framework: react
        - file: package.json
          contains: "\"vue\""
          boost-confidence: 0.03
          framework: vue
        - file: package.json
          contains: "\"svelte\""
          boost-confidence: 0.03
          framework: svelte
        - file: hugo.toml
          contains: "baseURL"
          boost-confidence: 0.05
          framework: hugo
        - file: hugo.yaml
          contains: "baseURL"
          boost-confidence: 0.05
          framework: hugo
      # Lower base confidence — webserver is a fallback when no language is detected.
      confidence: 0.70
    
    build:
      # For plain static sites, no build step is needed — just copy files.
      # For SPAs (React/Vue/Vite), npm ci && npm run build compiles assets.
      dependencies:
        - busybox
        - nodejs
        - npm
        - git
      # Copies static files to /home/build/output/html (nginx default root).
      # For Vite SPAs: npm build output lands in dist/
      # For plain HTML: copy everything except node_modules
      command: |
        if [ -f "package.json" ]; then
          npm ci --prefer-offline
          npm run build --if-present
          mkdir -p /home/build/output/html
          if [ -d "dist" ]; then
            cp -r dist/. /home/build/output/html/
          elif [ -d "build" ]; then
            cp -r build/. /home/build/output/html/
          elif [ -d "out" ]; then
            cp -r out/. /home/build/output/html/
          fi
        else
          mkdir -p /home/build/output/html
          cp -r . /home/build/output/html/
        fi
      env:
        NODE_ENV: "production"
        CI: "true"
    
    image:
      # nginx serves the static files.
      # nginx-config-bundle provides a sensible default nginx.conf.
      packages:
        - nginx
        - ca-certificates-bundle=20260413-r0
      entrypoint: nginx
      cmd:
        - "-g"
        - "daemon off;"
      run-as: 65532
      ports:
        - "8080"
      env:
        NGINX_PORT: "8080"
    

