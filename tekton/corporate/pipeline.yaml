apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: apexpack
  annotations:
    tekton.dev/description: >-
      Corporate apexpack pipeline. Mirrors the structure of the existing
      docker-v1-0 pipeline: clone → gitleaks → version-release →
      apexpack-build → tag-version.
      Replaces install-external-artifacts + build-push-image (ClusterTasks)
      with apexpack-build (which runs melange + apko publish in one step).
spec:
  # ── Params ──────────────────────────────────────────────────────────────────
  # Kept identical to the docker-v1-0 pipeline where possible so existing
  # PipelineRun manifests need minimal changes.
  params:
    - name: app-id
      type: string
      description: Application name (used as project name and APK package name).

    - name: release-id
      type: string
      description: "Optional id attached to version names (git tags, image tags)."
      default: ""

    - name: release-strategy
      type: string
      description: "Versioning strategy: semantic or timestamped-hash."
      default: "timestamped-hash"

    - name: release-channels
      type: array
      description: "Additional image tags to publish (e.g. latest, dev, next)."
      default: []

    - name: image-name
      type: string
      description: >-
        Full image path without tag
        (e.g. artifacts.bcp.absa.co.za/my-repo/myapp).

    - name: git-url
      type: string
      description: "Source repository URL."

    - name: git-revision
      type: string
      description: "Branch, tag, or commit SHA to build."
      default: "main"

    - name: git-branch-type
      type: string
      description: "Branch type injected by the trigger: push or pull_request."
      default: "push"

    - name: git-source-branch
      type: string
      description: "Source branch name (injected by trigger)."
      default: ""

    - name: git-target-branch
      type: string
      description: "Target branch for PRs (injected by trigger)."
      default: ""

    - name: gitleaks_exit_code
      type: string
      description: "Exit code when gitleaks finds secrets. Set to 0 to warn without failing."
      default: "1"

    # ── apexpack-specific ────────────────────────────────────────────────────
    - name: runtime
      type: string
      description: "Language runtime override for apexpack. Leave empty for auto-detect."
      default: ""

    - name: apexpack-image
      type: string
      description: "apexpack container image to use. Override to pin a version or use your Artifactory mirror."
      default: "apexpack:latest"
    - name: cert-url
      type: string
      description: >-
        URL to fetch the corporate CA certificate from. Leave empty to skip
        the cert fetch (no TLS proxy in the cluster).
      default: ""

  # ── Workspaces ───────────────────────────────────────────────────────────────
  workspaces:
    - name: source
      description: "Primary workspace: code is cloned here, all tasks share it."
    - name: shared
      description: "Shared workspace: apexpack writes the APK and SBOM here."
    - name: cache
      description: "Optional cache workspace for package manager caches."
      optional: true

  # ── Results ──────────────────────────────────────────────────────────────────
  results:
    - name: images.pushed-image
      description: "The primary image reference that was pushed."
      value: $(tasks.apexpack-build.results.PUSHED_IMAGE)

  # ── Tasks ────────────────────────────────────────────────────────────────────
  tasks:
    # ── 1. Clone source ───────────────────────────────────────────────────────
    - name: clone-source
      taskRef:
        name: git-clone-v1-0
        kind: ClusterTask
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source

    # ── 2. Secret scanning ────────────────────────────────────────────────────
    - name: gitleaks-scan
      taskRef:
        name: gitleaks
        kind: ClusterTask
      runAfter:
        - clone-source
      params:
        - name: exit-code
          value: $(params.gitleaks_exit_code)
      workspaces:
        - name: source
          workspace: source

    # ── 3. Calculate release version (pre-build — no git tag yet) ────────────
    - name: version-release
      taskRef:
        name: build-version-v1-0
        kind: ClusterTask
      runAfter:
        - clone-source
        - gitleaks-scan
      params:
        - name: app-id
          value: $(params.app-id)
        - name: release-strategy
          value: $(params.release-strategy)
        - name: release-id
          value: $(params.release-id)
        - name: git-hash
          value: $(tasks.clone-source.results.commit)
        - name: git-branch-type
          value: $(params.git-branch-type)
        - name: push-tag
          value: "False"
      workspaces:
        - name: source
          workspace: source

    # ── 4. Fetch corporate CA cert ────────────────────────────────────────────
    # Runs in parallel with clone/version — no source dependency.
    # Skipped automatically when cert-url is empty.
    - name: fetch-ca-cert
      taskRef:
        name: fetch-ca-cert
        kind: ClusterTask
      when:
        - input: $(params.cert-url)
          operator: notin
          values: [""]
      params:
        - name: CERT_URL
          value: $(params.cert-url)
      workspaces:
        - name: shared
          workspace: shared

    # ── 5. Build and publish OCI image with apexpack ──────────────────────────
    # Replaces: install-external-artifacts + build-push-image + crane-push ClusterTasks.
    # Detects the language, runs melange (APK build), then apko publish which
    # pushes directly to the registry. SBOM is written to the 'shared' workspace.
    # Registry credentials are read from the regcred docker secret (mounted in the task).
    - name: apexpack-build
      taskRef:
        name: apexpack-build
        kind: ClusterTask
      runAfter:
        - version-release
        - fetch-ca-cert
      params:
        - name: IMAGE
          value: "$(params.image-name):$(tasks.version-release.results.release-version)"
        - name: VERSION
          value: $(tasks.version-release.results.release-version)
        - name: PROJECT_NAME
          value: $(params.app-id)
        - name: APEXPACK_IMAGE
          value: $(params.apexpack-image)
        - name: TLS_CA_PATH
          value: $(tasks.fetch-ca-cert.results.cert-path)
      workspaces:
        - name: source
          workspace: source
        - name: shared
          workspace: shared

    # ── 6. Push git tag now that the image is live ────────────────────────────
    - name: tag-version
      taskRef:
        name: build-version-v1-0
        kind: ClusterTask
      runAfter:
        - apexpack-build
      params:
        - name: app-id
          value: $(params.app-id)
        - name: release-strategy
          value: $(params.release-strategy)
        - name: release-id
          value: $(params.release-id)
        - name: git-hash
          value: $(tasks.clone-source.results.commit)
        - name: git-branch-type
          value: $(params.git-branch-type)
        - name: push-tag
          value: "True"
      workspaces:
        - name: source
          workspace: source
