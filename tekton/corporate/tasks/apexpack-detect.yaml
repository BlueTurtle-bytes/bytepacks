apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-detect
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack detect"
    tekton.dev/description: >-
      Detects the language and framework of a source repository.
      Seeds the profiles workspace from the apexpack image on every run
      so the PVC stays in sync with the deployed apexpack version.
      Writes detection results to source/.apexpack/context.json via the
      apexpack binary — no shell jq required.
      Uses a configurable APEXPACK_IMAGE param so the image can be pulled
      from the corporate Artifactory mirror.
spec:
  params:
    - name: APEXPACK_IMAGE
      description: "apexpack container image. Override to use your Artifactory mirror or pin a version."
      default: "apexpack:latest"
    - name: RUNTIME_OVERRIDE
      description: "Skip detection and use this runtime (e.g. golang, java). Empty = auto-detect."
      default: ""
    - name: AUTO_PATCH_OVERRIDE
      description: "Force AUTO_PATCH on (true) regardless of the profile setting. Empty = use profile default."
      default: ""
    - name: PATCH_PERSIST_OVERRIDE
      description: "Force PATCH_PERSIST on (true) regardless of the profile setting. Empty = use profile default."
      default: ""
    - name: GIT_URL
      description: "Source repository URL. Written to context.json."
      default: ""
    - name: GIT_BRANCH
      description: "Branch or revision being built. Written to context.json."
      default: ""
    - name: GIT_COMMIT
      description: "Full commit SHA being built. Written to context.json."
      default: ""
    - name: PROJECT_NAME
      description: "Application / project name. Written to context.json."
      default: ""

  workspaces:
    - name: source
      description: "Cloned source code to detect."
    - name: profiles
      description: >-
        Profiles workspace. Profiles are seeded from the apexpack image on every run
        into <profiles-workspace>/profiles/. The patch task updates them in-place.
        Bind to a ReadWriteOnce PVC.

  results:
    - name: RUNTIME
      description: "Detected runtime (e.g. golang, java, python, node, dotnet, webserver)."
    - name: FRAMEWORK
      description: "Detected framework (e.g. gin, spring-boot, express). Empty if not identified."
    - name: CONFIDENCE
      description: "Detection confidence as a percentage (e.g. 90)."
    - name: AUTO_PATCH
      description: "Resolved auto-patch flag (true/false) — profile default, overridden by AUTO_PATCH_OVERRIDE param."
    - name: PATCH_PERSIST
      description: "Resolved patch-persist flag (true/false) — profile default, overridden by PATCH_PERSIST_OVERRIDE param."

  steps:
    - name: detect
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      securityContext:
        runAsUser: 0
      script: |
        #!/bin/sh
        set -e

        PROFILES_DIR="$(workspaces.profiles.path)/profiles"

        # Seed profiles from the apexpack image on every run so the PVC stays
        # in sync with whichever apexpack version the pipeline is using.
        rm -rf "$PROFILES_DIR"
        mkdir -p "$PROFILES_DIR"
        if ! ls /etc/apexpack/profiles/*.yaml >/dev/null 2>&1; then
          echo "ERROR: /etc/apexpack/profiles/ is empty — rebuild the apexpack image."
          exit 1
        fi
        cp /etc/apexpack/profiles/*.yaml "$PROFILES_DIR/"
        echo "Profiles seeded: $(ls $PROFILES_DIR | tr '\n' ' ')"

        # Build optional flag list for runtime override and auto-patch/patch-persist overrides.
        EXTRA_FLAGS=""
        if [ -n "$(params.RUNTIME_OVERRIDE)" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --runtime $(params.RUNTIME_OVERRIDE)"
        fi
        if [ -n "$(params.AUTO_PATCH_OVERRIDE)" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --auto-patch $(params.AUTO_PATCH_OVERRIDE)"
        fi
        if [ -n "$(params.PATCH_PERSIST_OVERRIDE)" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --patch-persist $(params.PATCH_PERSIST_OVERRIDE)"
        fi

        # Run detect — writes .apexpack/context.json as a side effect.
        apexpack detect "$(workspaces.source.path)" \
          --profiles-dir "$PROFILES_DIR" \
          --project-name "$(params.PROJECT_NAME)" \
          --git-url     "$(params.GIT_URL)" \
          --git-branch  "$(params.GIT_BRANCH)" \
          --git-commit  "$(params.GIT_COMMIT)" \
          $EXTRA_FLAGS

        # Extract Tekton result values from context.json.
        # These three values gate 'when' conditions in the pipeline — they must
        # remain as Tekton results. Everything else lives in context.json only.
        CTX="$(workspaces.source.path)/.apexpack/context.json"

        jq -r '.runtime'                  "$CTX" > $(results.RUNTIME.path)
        jq -r '.framework        // ""'   "$CTX" > $(results.FRAMEWORK.path)
        jq -r '.confidence       // "0"'  "$CTX" > $(results.CONFIDENCE.path)
        jq -r '.auto_patch       // "false"' "$CTX" > $(results.AUTO_PATCH.path)
        jq -r '.patch_persist    // "false"' "$CTX" > $(results.PATCH_PERSIST.path)

        echo ""
        echo "Detected: $(jq -r '.runtime' $CTX) framework=$(jq -r '.framework // "none"' $CTX)"
        echo "Scan config: auto-patch=$(jq -r '.auto_patch' $CTX)  patch-persist=$(jq -r '.patch_persist' $CTX)"
