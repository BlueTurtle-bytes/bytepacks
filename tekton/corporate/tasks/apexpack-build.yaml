apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-build-corporate
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack build (corporate)"
    tekton.dev/description: >-
      Builds a minimal Wolfi-based OCI image from source using melange + apko.
      Designed to slot into the corporate Docker pipeline in place of
      install-external-artifacts + build-push-image.
      Pulls Artifactory / NuGet credentials from existing K8s secrets.
spec:
  params:
    - name: IMAGE
      description: >-
        Full OCI image reference including tag
        (e.g. artifacts.corp.com/myrepo/myapp:v1.2.3).
    - name: VERSION
      description: "APK package version — typically $(tasks.version-release.results.release-version)."
      default: "0.0.1"
    - name: PROJECT_NAME
      description: >-
        Project / app name. Defaults to source directory basename.
        Pass $(params.app-id) from the corporate pipeline.
      default: ""
    - name: RUNTIME
      description: "Language runtime override. Leave empty for auto-detect."
      default: ""
    - name: APEXPACK_IMAGE
      description: "apexpack container image to run. Override to pin a version or use your Artifactory mirror."
      default: "apexpack:latest"

  workspaces:
    - name: source
      description: "Cloned source code (maps to the corporate 'source' workspace)."
    - name: output
      description: "Build artifacts output — OCI tarball, APK, SBOM (maps to the corporate 'shared' workspace)."
    - name: profiles
      description: >-
        Optional profiles repository. When not bound, the profiles embedded in
        APEXPACK_IMAGE are used — no extra PVC required.
      optional: true
    - name: dockerconfig
      description: "Optional .docker/config.json for Artifactory push. Mount the dockerconfig Secret here."
      optional: true
      mountPath: /root/.docker
    - name: tls-ca
      description: >-
        Optional Secret with a corporate CA certificate (key: ca-bundle.crt).
        Required when the cluster has a TLS-intercepting proxy.
      optional: true

  results:
    - name: IMAGE_TARBALL
      description: "Absolute path to the OCI image tarball in the output workspace."
    - name: SBOM_PATH
      description: "Absolute path to the SPDX SBOM in the output workspace."
    - name: APK_PATH
      description: "Absolute path to the built APK in the output workspace."

  stepTemplate:
    securityContext:
      privileged: true  # melange needs bubblewrap
      runAsUser: 0

  steps:
    - name: build
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      env:
        # Artifactory Maven mirror credentials — sourced from the 'artifactory-creds' secret.
        # kubectl create secret generic artifactory-creds \
        #   --from-literal=MAVEN_MIRROR_USER=<user> \
        #   --from-literal=MAVEN_MIRROR_PASSWORD=<token>
        - name: MAVEN_MIRROR_USER
          valueFrom:
            secretKeyRef:
              name: artifactory-creds
              key: MAVEN_MIRROR_USER
              optional: true
        - name: MAVEN_MIRROR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artifactory-creds
              key: MAVEN_MIRROR_PASSWORD
              optional: true
        # Artifactory NuGet feed credentials — sourced from the 'nuget-creds' secret.
        # kubectl create secret generic nuget-creds \
        #   --from-literal=NUGET_MIRROR_USER=<user> \
        #   --from-literal=NUGET_MIRROR_PASSWORD=<token>
        - name: NUGET_MIRROR_USER
          valueFrom:
            secretKeyRef:
              name: nuget-creds
              key: NUGET_MIRROR_USER
              optional: true
        - name: NUGET_MIRROR_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nuget-creds
              key: NUGET_MIRROR_PASSWORD
              optional: true
      script: |
        #!/bin/sh
        set -e

        PROFILES_FLAG=""
        if [ "$(workspaces.profiles.bound)" = "true" ]; then
          if [ -d "$(workspaces.profiles.path)/profiles" ]; then
            PROFILES_FLAG="--profiles-dir $(workspaces.profiles.path)/profiles"
          else
            PROFILES_FLAG="--profiles-dir $(workspaces.profiles.path)"
          fi
        fi

        RUNTIME_FLAG=""
        if [ -n "$(params.RUNTIME)" ]; then
          RUNTIME_FLAG="--runtime $(params.RUNTIME)"
        fi

        NAME_FLAG=""
        if [ -n "$(params.PROJECT_NAME)" ]; then
          NAME_FLAG="--project-name $(params.PROJECT_NAME)"
        fi

        TLS_CA_FLAG=""
        if [ "$(workspaces.tls-ca.bound)" = "true" ]; then
          TLS_CA_FLAG="--tls-extra-ca $(workspaces.tls-ca.path)/ca-bundle.crt"
        fi

        apexpack build \
          $(workspaces.source.path) \
          --tag $(params.IMAGE) \
          --version $(params.VERSION) \
          --output $(workspaces.output.path) \
          $PROFILES_FLAG \
          $RUNTIME_FLAG \
          $NAME_FLAG \
          $TLS_CA_FLAG

        SOURCE_BASE=$(basename $(workspaces.source.path))
        ARCH=$(uname -m)
        printf "%s" "$(workspaces.output.path)/${SOURCE_BASE}.tar"     > $(results.IMAGE_TARBALL.path)
        printf "%s" "$(workspaces.output.path)/sbom-${ARCH}.spdx.json" > $(results.SBOM_PATH.path)
        printf "%s" "$(workspaces.output.path)/packages/${ARCH}/*.apk" > $(results.APK_PATH.path)

        echo "Build complete:"
        ls -lh $(workspaces.output.path)/
