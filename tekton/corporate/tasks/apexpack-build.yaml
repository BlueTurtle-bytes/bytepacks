apiVersion: tekton.dev/v1
kind: ClusterTask
metadata:
  name: apexpack-build
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack build"
    tekton.dev/description: >-
      Builds a minimal Wolfi-based OCI image from source using melange + apko.
      Designed to slot into the corporate Docker pipeline in place of
      install-external-artifacts + build-push-image.
      Writes build artifact paths to source/.apexpack/context.json via the
      apexpack binary — no shell jq required.
      Derives Artifactory / NuGet credentials from the regcred docker config secret.
spec:
  params:
    - name: IMAGE
      description: >-
        Full OCI image reference including tag
        (e.g. artifacts.corp.com/myrepo/myapp:v1.2.3).
    - name: VERSION
      description: "APK package version — typically $(tasks.version-release.results.release-version)."
      default: "0.0.1"
    - name: PROJECT_NAME
      description: >-
        Project / app name. Defaults to source directory basename.
        Pass $(params.app-id) from the corporate pipeline.
      default: ""
    - name: APEXPACK_IMAGE
      description: "apexpack container image to run. Override to pin a version or use your Artifactory mirror."
      default: "apexpack:latest"
    - name: TLS_CA_PATH
      description: >-
        Absolute path to the CA certificate PEM in the shared workspace
        (e.g. /workspace/shared/cacerts.pem). Leave empty to skip TLS cert setup.
      default: ""

  workspaces:
    - name: source
      description: "Cloned source code (maps to the corporate 'source' workspace)."
    - name: shared
      description: "Shared workspace — APK and SBOM are written here."
    - name: profiles
      description: >-
        Optional profiles repository. When not bound, the profiles embedded in
        APEXPACK_IMAGE are used — no extra PVC required.
      optional: true

  results:
    - name: PUSHED_IMAGE
      description: "Image reference that was pushed to the registry by apko publish."
    - name: SBOM_PATH
      description: "Absolute path to the SPDX SBOM in the output workspace."
    - name: APK_PATH
      description: "Absolute path to the built APK in the output workspace."

  volumes:
    - name: docker-credentials
      secret:
        secretName: regcred
        items:
          - key: .dockerconfigjson
            path: config.json
    - name: signing-key
      secret:
        secretName: melange-signing-key
        optional: true   # absent = generate a throwaway key per build

  stepTemplate:
    securityContext:
      privileged: true  # melange needs bubblewrap
      runAsUser: 0

  steps:
    - name: build
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      env:
        - name: DOCKER_CONFIG
          value: /etc/docker-creds
      volumeMounts:
        - name: docker-credentials
          mountPath: /etc/docker-creds
          readOnly: true
        - name: signing-key
          mountPath: /etc/melange-keys
          readOnly: true
      script: |
        #!/bin/sh
        set -e

        # Decode Artifactory credentials from the mounted regcred docker config.
        # The same user/token is used for Maven mirror and NuGet feed.
        if [ -f /etc/docker-creds/config.json ]; then
          _auth=$(jq -r 'first(.auths | to_entries[].value.auth) // ""' /etc/docker-creds/config.json)
          if [ -n "$_auth" ] && [ "$_auth" != "null" ]; then
            _decoded=$(printf '%s' "$_auth" | base64 -d)
            export ARTI_USER="${_decoded%%:*}"
            export ARTI_PASSWORD="${_decoded#*:}"
          fi
        fi

        PROFILES_FLAG=""
        if [ "$(workspaces.profiles.bound)" = "true" ]; then
          if [ -d "$(workspaces.profiles.path)/profiles" ]; then
            PROFILES_FLAG="--profiles-dir $(workspaces.profiles.path)/profiles"
          else
            PROFILES_FLAG="--profiles-dir $(workspaces.profiles.path)"
          fi
        fi

        NAME_FLAG=""
        if [ -n "$(params.PROJECT_NAME)" ]; then
          NAME_FLAG="--project-name $(params.PROJECT_NAME)"
        fi

        SIGNING_KEY_FLAG=""
        if [ -f "/etc/melange-keys/melange.rsa" ]; then
          SIGNING_KEY_FLAG="--signing-key /etc/melange-keys/melange.rsa"
        fi

        TLS_CA_FLAG=""
        if [ -n "$(params.TLS_CA_PATH)" ] && [ -e "$(params.TLS_CA_PATH)" ]; then
          if [ -d "$(params.TLS_CA_PATH)" ]; then
            find "$(params.TLS_CA_PATH)" \( -name "*.pem" -o -name "*.crt" \) -exec cat {} + \
              >> /etc/ssl/certs/ca-certificates.crt
          else
            cat "$(params.TLS_CA_PATH)" >> /etc/ssl/certs/ca-certificates.crt
          fi
          export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
          TLS_CA_FLAG="--tls-extra-ca $(params.TLS_CA_PATH)"
        fi

        # Build — apko publish pushes directly to the registry.
        # Writes .apexpack/context.json with artifact paths as a side effect.
        apexpack build \
          $(workspaces.source.path) \
          --tag     $(params.IMAGE) \
          --version $(params.VERSION) \
          --output  $(workspaces.shared.path) \
          $PROFILES_FLAG \
          $NAME_FLAG \
          $TLS_CA_FLAG \
          $SIGNING_KEY_FLAG

        # Read artifact paths from context.json and write to Tekton results.
        # printf '%s' avoids the trailing newline that jq -r appends, which
        # would otherwise be embedded in downstream param substitutions.
        CTX="$(workspaces.source.path)/.apexpack/context.json"
        printf '%s' "$(jq -r '.pushed_image // ""' "$CTX")" > $(results.PUSHED_IMAGE.path)
        echo "pushed_image result: $(cat $(results.PUSHED_IMAGE.path))"
        printf '%s' "$(jq -r '.sbom_path' "$CTX")" > $(results.SBOM_PATH.path)
        printf '%s' "$(jq -r '.apk_path'  "$CTX")" > $(results.APK_PATH.path)

        echo "Build complete:"
        ls -lh $(workspaces.shared.path)/
