apiVersion: tekton.dev/v1
kind: ClusterTask
metadata:
  name: fetch-ca-cert
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "fetch CA certificate"
    tekton.dev/description: >-
      Downloads a corporate CA certificate from CERT_URL.
      Detects the type from the URL extension:
        .tar / .tar.gz / .tgz  → extracts to a directory
        .pem / .crt            → saves as a single file
      The result cert-path is the directory or file path in the shared workspace.
spec:
  params:
    - name: CERT_URL
      description: "URL to the CA certificate (.pem / .crt) or archive (.tar / .tar.gz / .tgz)."

  workspaces:
    - name: shared

  results:
    - name: cert-path
      description: "Absolute path to the downloaded file or extracted directory."

  steps:
    - name: fetch
      image: curlimages/curl:latest
      script: |
        #!/bin/sh
        set -e

        URL="$(params.CERT_URL)"
        BASENAME=$(basename "$URL")

        case "$BASENAME" in
          *.tar.gz|*.tgz)
            DEST="$(workspaces.shared.path)/${BASENAME%.t*}"
            mkdir -p "$DEST"
            echo "Downloading and extracting $URL ..."
            curl -Lk "$URL" | tar -xzf - -C "$DEST"
            echo "Extracted to $DEST"
            ;;
          *.tar)
            DEST="$(workspaces.shared.path)/${BASENAME%.tar}"
            mkdir -p "$DEST"
            echo "Downloading and extracting $URL ..."
            curl -Lk "$URL" | tar -xf - -C "$DEST"
            echo "Extracted to $DEST"
            ;;
          *.pem|*.crt)
            DEST="$(workspaces.shared.path)/$BASENAME"
            echo "Downloading $URL ..."
            curl -Lk "$URL" -o "$DEST"
            echo "Saved $(wc -c < "$DEST") bytes to $DEST"
            ;;
          *)
            echo "ERROR: unsupported cert URL — expected .pem, .crt, .tar, .tar.gz, or .tgz" >&2
            exit 1
            ;;
        esac

        printf "%s" "$DEST" > $(results.cert-path.path)
