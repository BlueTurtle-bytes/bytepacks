apiVersion: tekton.dev/v1
kind: ClusterTask
metadata:
  name: apexpack-scan
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack CVE scan"
    tekton.dev/description: >-
      Scans the SBOM produced by apexpack-build for CVEs using grype.
      SBOM version strings are normalised automatically before scanning.
      Per-severity counts and the scan result are written to
      source/.apexpack/context.json by the apexpack binary.
      Set SOFT_FAIL=true so the task exits 0 when auto-patch will run next.
      Set RESCAN=true to write results to rescan_* fields in context.json.
      Uses a configurable APEXPACK_IMAGE param so the image can be pulled
      from the corporate Artifactory mirror.
spec:
  params:
    - name: APEXPACK_IMAGE
      description: "apexpack container image. Override to use your Artifactory mirror or pin a version."
      default: "apexpack:latest"
    - name: FAIL_ON
      description: "Minimum severity that fails the pipeline: critical, high, medium, low, none."
      default: "high"
    - name: FORMAT
      description: "Scan report output format: table, json, sarif."
      default: "table"
    - name: SOFT_FAIL
      description: "When true, write fail result but exit 0 so the pipeline can continue to auto-patch."
      default: "false"
    - name: RESCAN
      description: "When true, write results to rescan_* fields in context.json instead of scan_*."
      default: "false"
    - name: TLS_CA_PATH
      description: "Absolute path to the CA certificate PEM in the shared workspace. Leave empty to skip."
      default: ""

  workspaces:
    - name: source
      description: "Source workspace — .apexpack/context.json is updated here."
    - name: shared
      description: "Shared workspace — scan report is written here."

  results:
    - name: SCAN_RESULT
      description: "pass or fail based on CVE findings at or above FAIL_ON severity."

  stepTemplate:
    securityContext:
      runAsUser: 0  # must match build step so context.json is readable/writable

  steps:
    - name: scan
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      env:
        - name: GRYPE_DB_CACHE_DIR
          value: "/tmp/grype-db"
      script: |
        #!/bin/sh
        set -e

        if [ -n "$(params.TLS_CA_PATH)" ] && [ -e "$(params.TLS_CA_PATH)" ]; then
          _CA_BUNDLE=/tmp/apexpack-ca-bundle.crt
          cp /etc/ssl/certs/ca-certificates.crt "$_CA_BUNDLE" 2>/dev/null || touch "$_CA_BUNDLE"
          if [ -d "$(params.TLS_CA_PATH)" ]; then
            find "$(params.TLS_CA_PATH)" \( -name "*.pem" -o -name "*.crt" \) -exec cat {} + >> "$_CA_BUNDLE"
          else
            cat "$(params.TLS_CA_PATH)" >> "$_CA_BUNDLE"
          fi
          export SSL_CERT_FILE="$_CA_BUNDLE"
        fi

        RESCAN_FLAG=""
        if [ "$(params.RESCAN)" = "true" ]; then
          RESCAN_FLAG="--rescan"
        fi

        SOFT_FAIL_FLAG=""
        if [ "$(params.SOFT_FAIL)" = "true" ]; then
          SOFT_FAIL_FLAG="--soft-fail"
        fi

        # apexpacks scan:
        #   - normalises the SBOM automatically
        #   - runs grype JSON to extract severity counts
        #   - writes scan_* (or rescan_*) fields to context.json
        #   - exits 1 on CVE threshold breach unless --soft-fail is set
        apexpacks scan \
          --source  "$(workspaces.source.path)" \
          --output  "$(workspaces.shared.path)" \
          --fail-on "$(params.FAIL_ON)" \
          --format  "$(params.FORMAT)" \
          $RESCAN_FLAG \
          $SOFT_FAIL_FLAG

        # Write SCAN_RESULT Tekton result from context.json.
        # This value gates 'when' conditions in the pipeline and must be a Tekton result.
        CTX="$(workspaces.source.path)/.apexpack/context.json"
        if [ "$(params.RESCAN)" = "true" ]; then
          jq -r '.rescan_result // "pass"' "$CTX" > $(results.SCAN_RESULT.path)
        else
          jq -r '.scan_result   // "pass"' "$CTX" > $(results.SCAN_RESULT.path)
        fi
