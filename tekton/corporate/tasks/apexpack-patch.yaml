apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apexpack-patch-corporate
  labels:
    app.kubernetes.io/version: "1.0"
  annotations:
    tekton.dev/displayName: "apexpack CVE auto-patch (corporate)"
    tekton.dev/description: >-
      Runs 'apexpack patch --apply' to update profile YAML files with pinned
      package versions that fix CVEs found during the scan step.
      Writes patches_applied and patched_packages to source/.apexpack/context.json
      via the apexpack binary — no shell jq required.
      When PERSIST=true, commits the updated profiles back to git so future
      pipeline runs start with the patched versions already pinned.
      Uses a configurable APEXPACK_IMAGE param so the image can be pulled
      from the corporate Artifactory mirror.
spec:
  params:
    - name: APEXPACK_IMAGE
      description: "apexpack container image. Override to use your Artifactory mirror or pin a version."
      default: "apexpack:latest"
    - name: PROFILES_SUBDIR
      description: "Subdirectory within the profiles workspace that contains *.yaml profile files."
      default: "profiles"
    - name: PERSIST
      description: >-
        When true, commit the patched profiles back to git.
        Leave empty to use the patch_persist value from context.json (set by detect).
      default: ""
    - name: GIT_REVISION
      description: >-
        Branch to push the patched profiles to (only used when PERSIST=true).
        Leave empty to use git_branch from context.json (set by detect).
      default: ""

  workspaces:
    - name: source
      description: "Source workspace — .apexpack/context.json is updated here."
    - name: profiles
      description: "Profiles workspace — profiles/*.yaml are patched in-place here."
    - name: output
      description: "Shared workspace — used to locate the SBOM (maps to 'shared' pipeline workspace)."
    - name: tls-ca
      description: "Optional Secret with a corporate CA cert (key: ca-bundle.crt) for TLS-intercepting proxies."
      optional: true

  results:
    - name: PATCHES_APPLIED
      description: "Number of package version pins written to profiles."

  steps:
    - name: patch
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      securityContext:
        runAsUser: 0
      script: |
        #!/bin/sh
        set -e

        PROFILES_PATH="$(workspaces.profiles.path)/$(params.PROFILES_SUBDIR)"

        if [ "$(workspaces.tls-ca.bound)" = "true" ]; then
          export SSL_CERT_FILE="$(workspaces.tls-ca.path)/ca-bundle.crt"
        fi

        echo "=== Applying CVE patches ==="
        echo "Profiles: $PROFILES_PATH"
        echo ""

        # apexpack patch --apply reads sbom_path and runtime from context.json
        # automatically — no --sbom or --runtime flag required.
        apexpack patch \
          --apply \
          --profiles-dir "$PROFILES_PATH" \
          --source       "$(workspaces.source.path)"

        # Write PATCHES_APPLIED Tekton result from context.json.
        # This value gates the rebuild 'when' condition — must be a Tekton result.
        CTX="$(workspaces.source.path)/.apexpack/context.json"
        jq -r '.patches_applied // "0"' "$CTX" > $(results.PATCHES_APPLIED.path)

        echo ""
        echo "$(cat $(results.PATCHES_APPLIED.path)) package(s) patched."

    - name: persist
      image: $(params.APEXPACK_IMAGE)
      imagePullPolicy: Always
      script: |
        #!/bin/sh
        set -e

        CTX="$(workspaces.source.path)/.apexpack/context.json"

        # Resolve PERSIST: param overrides context.json (set by detect via patch_persist).
        PERSIST_VAL="$(params.PERSIST)"
        if [ -z "$PERSIST_VAL" ]; then
          PERSIST_VAL=$(jq -r '.patch_persist // "false"' "$CTX" 2>/dev/null || echo "false")
        fi
        if [ "$PERSIST_VAL" != "true" ]; then
          echo "patch_persist=false — skipping git commit."
          exit 0
        fi

        COUNT=$(jq -r '.patches_applied // "0"' "$CTX" 2>/dev/null || echo "0")
        if [ "$COUNT" = "0" ]; then
          echo "No patches applied — nothing to commit."
          exit 0
        fi

        # Resolve branch: param overrides context.json (set by detect via git_branch).
        BRANCH="$(params.GIT_REVISION)"
        if [ -z "$BRANCH" ]; then
          BRANCH=$(jq -r '.git_branch // "main"' "$CTX" 2>/dev/null || echo "main")
        fi

        echo "=== Committing patched profiles to git (branch: $BRANCH) ==="
        cd "$(workspaces.profiles.path)"

        git config user.email "apexpack-bot@ci"
        git config user.name "apexpack-bot"
        git add "$(params.PROFILES_SUBDIR)/"

        if git diff --cached --quiet; then
          echo "No changes staged — profiles already up to date."
        else
          git commit -m "chore: auto-patch CVEs — pin $COUNT package(s) to latest Wolfi versions"
          git push origin "$BRANCH"
          echo "Patched profiles committed and pushed."
        fi
