apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: apexpack-build-and-push
  annotations:
    tekton.dev/description: >-
      Full apexpack build pipeline: clone-source → detect → build → scan → patch → rebuild → rescan → push.
      Profiles are seeded from the apexpack image on every run.
spec:
  params:
    - name: GIT_URL
      description: "Source repository URL to build."
    - name: GIT_REVISION
      description: "Branch, tag, or commit SHA to build."
      default: "main"
    - name: IMAGE
      description: "Full OCI image reference to push (e.g. ghcr.io/myorg/myapp:v1.0.0)."
    - name: VERSION
      description: "Version string for the APK package."
      default: "0.0.1"
    - name: RUNTIME
      description: "Language runtime override. Empty = auto-detect."
      default: ""
    - name: FAIL_ON
      description: "CVE severity that fails the pipeline."
      default: "high"
    - name: PROFILES_GIT_URL
      description: >-
        Git URL of the repository containing profiles/*.yaml files.
        Defaults to the apexpack repo. Override to use your own profiles repo.
      default: "https://github.com/apexpack/apexpack"
    - name: PROFILES_GIT_REVISION
      description: "Branch or tag of the profiles repo to use."
      default: "main"
    - name: AUTO_PATCH
      description: >-
        Force auto-patch on for this run regardless of the language profile setting.
        Leave empty to use the profile's scan.auto-patch default.
      default: ""
    - name: PATCH_PERSIST
      description: >-
        Force patch-persist on for this run regardless of the language profile setting.
        Leave empty to use the profile's scan.patch-persist default.
      default: ""
    - name: GIT_SSL_VERIFY
      description: >-
        Set to "false" to disable TLS verification for git clone (corporate proxies).
        Prefer mounting a CA cert via the git-ssl-ca workspace instead.
      default: "true"

  workspaces:
    - name: source
      description: "Source code being built."
    - name: profiles
      description: "Cloned profiles repo — profiles/*.yaml are read from here."
    - name: output
      description: "Build artifacts: OCI tarball, APK, SBOM, scan results."
    - name: registry-credentials
      description: "Docker config.json for registry auth (optional)."
      optional: true
    - name: git-ssl-ca
      description: >-
        Optional Secret containing a corporate CA certificate (key: ca-bundle.crt).
        Mounted into git-clone so it can verify corporate HTTPS proxies.
      optional: true

  results:
    - name: RUNTIME
      value: "$(tasks.detect.results.RUNTIME)"
    - name: FRAMEWORK
      value: "$(tasks.detect.results.FRAMEWORK)"
    - name: IMAGE_TARBALL
      value: "$(tasks.build.results.IMAGE_TARBALL)"
    - name: SBOM_PATH
      value: "$(tasks.build.results.SBOM_PATH)"
    - name: SCAN_RESULT
      value: "$(tasks.scan.results.SCAN_RESULT)"
    - name: AUTO_PATCH
      value: "$(tasks.detect.results.AUTO_PATCH)"
    - name: PATCH_PERSIST
      value: "$(tasks.detect.results.PATCH_PERSIST)"
    - name: PATCHES_APPLIED
      value: "$(tasks.patch.results.PATCHES_APPLIED)"
    - name: RESCAN_RESULT
      value: "$(tasks.rescan.results.SCAN_RESULT)"

  tasks:
    # ── Step 1: Clone source repo ─────────────────────────────────────────────
    - name: clone-source
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
        - name: sslVerify
          value: $(params.GIT_SSL_VERIFY)
      workspaces:
        - name: output
          workspace: source
        - name: ssl-ca-directory
          workspace: git-ssl-ca

    # ── Step 2: Detect language and framework ─────────────────────────────────
    - name: detect
      taskRef:
        name: apexpack-detect
      runAfter:
        - clone-source
      params:
        - name: RUNTIME_OVERRIDE
          value: $(params.RUNTIME)
        - name: AUTO_PATCH_OVERRIDE
          value: $(params.AUTO_PATCH)
        - name: PATCH_PERSIST_OVERRIDE
          value: $(params.PATCH_PERSIST)
      workspaces:
        - name: source
          workspace: source
        - name: profiles
          workspace: profiles

    # ── Step 3: Build OCI image ───────────────────────────────────────────────
    - name: build
      taskRef:
        name: apexpack-build
      runAfter:
        - detect
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: VERSION
          value: $(params.VERSION)
        - name: RUNTIME
          value: $(tasks.detect.results.RUNTIME)
      workspaces:
        - name: source
          workspace: source
        - name: profiles
          workspace: profiles
        - name: output
          workspace: output
        - name: registry-credentials
          workspace: registry-credentials

    # ── Step 4: CVE scan ──────────────────────────────────────────────────────
    - name: scan
      taskRef:
        name: apexpack-scan
      runAfter:
        - build
      params:
        - name: SBOM_PATH
          value: $(tasks.build.results.SBOM_PATH)
        - name: FAIL_ON
          value: $(params.FAIL_ON)
        - name: FORMAT
          value: sarif
        - name: SOFT_FAIL
          value: $(tasks.detect.results.AUTO_PATCH)
      workspaces:
        - name: output
          workspace: output

    # ── Step 5: Auto-patch CVEs (only when AUTO_PATCH=true and scan failed) ───
    - name: patch
      taskRef:
        name: apexpack-patch
      runAfter:
        - scan
      when:
        - input: "$(tasks.scan.results.SCAN_RESULT)"
          operator: in
          values: ["fail"]
        - input: "$(tasks.detect.results.AUTO_PATCH)"
          operator: in
          values: ["true"]
      params:
        - name: SBOM_PATH
          value: $(tasks.build.results.SBOM_PATH)
        - name: PROFILES_SUBDIR
          value: profiles
        - name: PERSIST
          value: $(tasks.detect.results.PATCH_PERSIST)
        - name: GIT_REVISION
          value: $(params.PROFILES_GIT_REVISION)
        - name: RUNTIME
          value: $(tasks.detect.results.RUNTIME)
      workspaces:
        - name: profiles
          workspace: profiles
        - name: output
          workspace: output

    # ── Step 6: Rebuild with patched profiles (only after a successful patch) ─
    - name: rebuild
      taskRef:
        name: apexpack-build
      runAfter:
        - patch
      when:
        - input: "$(tasks.scan.results.SCAN_RESULT)"
          operator: in
          values: ["fail"]
        - input: "$(tasks.detect.results.AUTO_PATCH)"
          operator: in
          values: ["true"]
        - input: "$(tasks.patch.results.PATCHES_APPLIED)"
          operator: notin
          values: ["0", ""]
      params:
        - name: IMAGE
          value: $(params.IMAGE)
        - name: VERSION
          value: $(params.VERSION)
        - name: RUNTIME
          value: $(tasks.detect.results.RUNTIME)
      workspaces:
        - name: source
          workspace: source
        - name: profiles
          workspace: profiles
        - name: output
          workspace: output
        - name: registry-credentials
          workspace: registry-credentials

    # ── Step 7: Re-scan rebuilt image to confirm CVEs resolved ───────────────
    # Only runs when rebuild ran (same when guards). Uses the rebuild SBOM so
    # we scan the patched image, not the original. Soft-fail keeps the pipeline
    # alive so push still completes — check logs for the verdict.
    - name: rescan
      taskRef:
        name: apexpack-scan
      runAfter:
        - rebuild
      when:
        - input: "$(tasks.scan.results.SCAN_RESULT)"
          operator: in
          values: ["fail"]
        - input: "$(tasks.detect.results.AUTO_PATCH)"
          operator: in
          values: ["true"]
        - input: "$(tasks.patch.results.PATCHES_APPLIED)"
          operator: notin
          values: ["0", ""]
      params:
        - name: SBOM_PATH
          value: $(tasks.rebuild.results.SBOM_PATH)
        - name: FAIL_ON
          value: $(params.FAIL_ON)
        - name: FORMAT
          value: table
        - name: SOFT_FAIL
          value: "true"
      workspaces:
        - name: output
          workspace: output

    # ── Step 8: Push to registry ──────────────────────────────────────────────
    # Runs after rescan (or rebuild if rescan was skipped). Uses the rebuilt
    # tarball when a patch cycle ran, otherwise the original build tarball.
    - name: push
      taskRef:
        name: crane-copy
      runAfter:
        - rescan
      params:
        - name: source
          value: "$(tasks.build.results.IMAGE_TARBALL)"
        - name: destination
          value: $(params.IMAGE)
      workspaces:
        - name: output
          workspace: output
        - name: credentials
          workspace: registry-credentials
