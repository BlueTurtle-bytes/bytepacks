apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: apexpack-golang-
spec:
  pipelineRef:
    name: apexpack-build-and-push
  params:
    - name: GIT_URL
      value: https://github.com/Nimbostack/nimbopacks
    - name: GIT_REVISION
      value: main
    - name: IMAGE
      value: ttl.sh/nimbopacks:1h
    - name: FAIL_ON
      value: high
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: apexpack-source
    - name: profiles
      persistentVolumeClaim:
        claimName: apexpack-profiles
    - name: output
      persistentVolumeClaim:
        claimName: apexpack-output
