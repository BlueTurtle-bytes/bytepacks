# Python language profile
# Detects: requirements.txt, pyproject.toml, Pipfile, setup.py
# Supports: FastAPI, Django, Flask, plain Python
# Package managers: pip (default), uv, poetry, pipenv
# Runtime image: Wolfi + python-3.12

runtime: python
version: "1"
description: Python application (FastAPI, Django, Flask, uvicorn)

detect:
  files:
    - requirements.txt
    - pyproject.toml
    - Pipfile
    - setup.py
  package-managers:
    - file: uv.lock
      manager: uv
    - file: poetry.lock
      manager: poetry
    - file: Pipfile.lock
      manager: pipenv
  content:
    - file: requirements.txt
      contains: "fastapi"
      boost-confidence: 0.04
      framework: fastapi
    - file: requirements.txt
      contains: "django"
      boost-confidence: 0.04
      framework: django
    - file: requirements.txt
      contains: "flask"
      boost-confidence: 0.04
      framework: flask
    - file: requirements.txt
      contains: "aiohttp"
      boost-confidence: 0.03
      framework: aiohttp
    - file: pyproject.toml
      contains: "fastapi"
      boost-confidence: 0.04
      framework: fastapi
    - file: pyproject.toml
      contains: "django"
      boost-confidence: 0.04
      framework: django
    - file: pyproject.toml
      contains: "flask"
      boost-confidence: 0.04
      framework: flask

  confidence: 0.85

build:
  dependencies:
    - busybox
    - python-3.12
    - py3-pip
    - build-base
    - git
  # Default: pip from requirements.txt
  command: |
    pip install --no-cache-dir -r requirements.txt --target /home/build/output/app/deps
    cp -r . /home/build/output/app/src
  env:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PIP_NO_CACHE_DIR: "1"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  caches:
    - /home/build/.cache/pip

  frameworks:
    uv:
      dependencies:
        - busybox
        - python-3.12
        - uv
        - build-base
        - git
      command: |
        uv pip install -r requirements.txt --target /home/build/output/app/deps
        cp -r . /home/build/output/app/src
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        UV_CACHE_DIR: "/home/build/.cache/uv"
      caches:
        - /home/build/.cache/uv

    poetry:
      dependencies:
        - busybox
        - python-3.12
        - py3-pip
        - py3-poetry
        - build-base
        - git
      command: |
        poetry export -f requirements.txt --output /tmp/requirements.txt --without-hashes --without dev
        pip install --no-cache-dir -r /tmp/requirements.txt --target /home/build/output/app/deps
        cp -r . /home/build/output/app/src
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        POETRY_CACHE_DIR: "/home/build/.cache/pypoetry"
        PIP_NO_CACHE_DIR: "1"
      caches:
        - /home/build/.cache/pypoetry
        - /home/build/.cache/pip

    pipenv:
      command: |
        pip install pipenv
        pipenv requirements > /tmp/requirements.txt
        pip install --no-cache-dir -r /tmp/requirements.txt --target /home/build/output/app/deps
        cp -r . /home/build/output/app/src
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        PIP_NO_CACHE_DIR: "1"
        PIPENV_CACHE_DIR: "/home/build/.cache/pipenv"
      caches:
        - /home/build/.cache/pip
        - /home/build/.cache/pipenv

image:
  packages:
    - python-3.12
    - ca-certificates-bundle=20260413-r0
  entrypoint: python3
  cmd:
    - "-m"
    - "uvicorn"
    - "main:app"
    - "--host=0.0.0.0"
    - "--port=8000"
  run-as: 65532
  ports:
    - "8000"
  env:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: "/app/deps:/app/src"
