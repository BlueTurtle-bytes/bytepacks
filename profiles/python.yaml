# Python language profile
# Detects: requirements.txt, pyproject.toml, Pipfile, setup.py
# Supports: FastAPI, Django, Flask, plain Python
# Package managers: pip (default), uv, poetry, pipenv
# Runtime image: Wolfi + python-3

runtime: python
version: "1"
description: Python application (FastAPI, Django, Flask, uvicorn)

detect:
  files:
    - requirements.txt
    - pyproject.toml
    - Pipfile
    - setup.py
  package-managers:
    - file: uv.lock
      manager: uv
    - file: poetry.lock
      manager: poetry
    - file: Pipfile.lock
      manager: pipenv
  content:
    - file: requirements.txt
      contains: "fastapi"
      boost-confidence: 0.04
      framework: fastapi
    - file: requirements.txt
      contains: "django"
      boost-confidence: 0.04
      framework: django
    - file: requirements.txt
      contains: "flask"
      boost-confidence: 0.04
      framework: flask
    - file: requirements.txt
      contains: "aiohttp"
      boost-confidence: 0.03
      framework: aiohttp
    - file: pyproject.toml
      contains: "fastapi"
      boost-confidence: 0.04
      framework: fastapi
    - file: pyproject.toml
      contains: "django"
      boost-confidence: 0.04
      framework: django
    - file: pyproject.toml
      contains: "flask"
      boost-confidence: 0.04
      framework: flask

  confidence: 0.85

build:
  dependencies:
    - busybox
    - python-{PYTHON_VERSION}
    - py3-pip
    - build-base
    - git
    - postgresql-dev  # pg_config for psycopg2/psycopg2-binary source builds on aarch64
  # Default: pip from requirements.txt
  command: |
    pip install --no-cache-dir -r requirements.txt --target ${{targets.destdir}}/app/deps
    mkdir -p ${{targets.destdir}}/app/src
    tar --exclude=./melange-out --exclude=./.apexpack-output -cf - . | tar -C ${{targets.destdir}}/app/src -xf -
  env:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PIP_NO_CACHE_DIR: "1"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  caches:
    - /home/build/.cache/pip

  tls_ca_env:
    - SSL_CERT_FILE        # Python ssl module (OpenSSL-linked)
    - REQUESTS_CA_BUNDLE   # requests library (used by pip, poetry, pipenv)
    - PIP_CERT             # pip certificate override

  frameworks:
    uv:
      dependencies:
        - busybox
        - python-{PYTHON_VERSION}
        - uv
        - build-base
        - git
        - postgresql-dev
      command: |
        uv pip install -r requirements.txt --target ${{targets.destdir}}/app/deps
        mkdir -p ${{targets.destdir}}/app/src
        tar --exclude=./melange-out --exclude=./.apexpack-output -cf - . | tar -C ${{targets.destdir}}/app/src -xf -
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        UV_CACHE_DIR: "/home/build/.cache/uv"
      caches:
        - /home/build/.cache/uv

    poetry:
      dependencies:
        - busybox
        - python-{PYTHON_VERSION}
        - py3-pip
        - py3-poetry
        - build-base
        - git
        - postgresql-dev
      command: |
        poetry export -f requirements.txt --output /tmp/requirements.txt --without-hashes --without dev
        pip install --no-cache-dir -r /tmp/requirements.txt --target ${{targets.destdir}}/app/deps
        mkdir -p ${{targets.destdir}}/app/src
        tar --exclude=./melange-out --exclude=./.apexpack-output -cf - . | tar -C ${{targets.destdir}}/app/src -xf -
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        POETRY_CACHE_DIR: "/home/build/.cache/pypoetry"
        PIP_NO_CACHE_DIR: "1"
      caches:
        - /home/build/.cache/pypoetry
        - /home/build/.cache/pip

    pipenv:
      command: |
        pip install pipenv
        pipenv requirements > /tmp/requirements.txt
        pip install --no-cache-dir -r /tmp/requirements.txt --target ${{targets.destdir}}/app/deps
        mkdir -p ${{targets.destdir}}/app/src
        tar --exclude=./melange-out --exclude=./.apexpack-output -cf - . | tar -C ${{targets.destdir}}/app/src -xf -
      env:
        PYTHONDONTWRITEBYTECODE: "1"
        PYTHONUNBUFFERED: "1"
        PIP_NO_CACHE_DIR: "1"
        PIPENV_CACHE_DIR: "/home/build/.cache/pipenv"
      caches:
        - /home/build/.cache/pip
        - /home/build/.cache/pipenv

image:
  packages:
    - python-{PYTHON_VERSION}
    - ca-certificates-bundle=20260413-r0
  entrypoint: python3
  cmd:
    - "-m"
    - "uvicorn"
    - "main:app"
    - "--host=0.0.0.0"
    - "--port=8000"
  run-as: 65532
  ports:
    - "8000"
  env:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: "/app/deps:/app/src"

scan:
  auto-patch: false
  patch-persist: false

test:
  packages:
    - busybox
    - python-{PYTHON_VERSION}
  pipeline:
    - runs: |
        test -d /app/src || { echo "ERROR: /app/src not found"; exit 1; }
        test -d /app/deps || { echo "ERROR: /app/deps not found"; exit 1; }
        python3 --version
        echo "✓ Python app structure at /app is valid"
