# .NET language profile
# Detects: *.csproj (single project), *.sln (solution / monorepo)
# Supports: ASP.NET Core, Minimal API, Worker Service, Console apps
# Runtime image: Wolfi + aspnetcore-8-runtime (ASP.NET runtime, not SDK)

runtime: dotnet
version: "1"
description: .NET application (ASP.NET Core, Minimal API, Worker Service)

detect:
  # Glob patterns — .csproj and .sln filenames are always project-specific.
  patterns:
    - "*.csproj"
    - "*.sln"
  content:
    - file: global.json
      contains: "dotnet"
      boost-confidence: 0.05
    - file: Directory.Packages.props
      contains: "AspNetCore"
      boost-confidence: 0.05
      framework: aspnetcore
    - file: Directory.Packages.props
      contains: "MassTransit"
      boost-confidence: 0.03
      framework: masstransit
    - file: Directory.Packages.props
      contains: "Orleans"
      boost-confidence: 0.03
      framework: orleans
  confidence: 0.85

build:
  # dotnet-{DOTNET_VERSION}-sdk includes the compiler, NuGet restore, and publish tooling.
  dependencies:
    - busybox
    - dotnet-{DOTNET_VERSION}-sdk
    - build-base
    - git
    - ca-certificates-bundle
  # dotnet publish produces a self-contained output directory.
  # ${{targets.destdir}}/app is the melange staging path — files here get packaged into the APK.
  command: |
    NUGET_CONFIG=""
    if [ -f "/home/build/.nuget/NuGet/NuGet.Config" ]; then NUGET_CONFIG="--configfile /home/build/.nuget/NuGet/NuGet.Config"; fi
    DOTNET_RID="linux-$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')"
    dotnet restore -r "$DOTNET_RID" $NUGET_CONFIG
    dotnet publish -c Release -o ${{targets.destdir}}/app -r "$DOTNET_RID" --self-contained false --no-restore
    RCONFIG=$(find ${{targets.destdir}}/app -maxdepth 1 -name "*.runtimeconfig.json" | head -1)
    if [ -n "$RCONFIG" ]; then
      PROJ=$(basename "$RCONFIG" .runtimeconfig.json)
      if [ "$PROJ" != "app" ]; then
        for EXT in dll runtimeconfig.json deps.json pdb; do
          SRC="${{targets.destdir}}/app/$PROJ.$EXT"
          [ -f "$SRC" ] && mv "$SRC" "${{targets.destdir}}/app/app.$EXT"
        done
      fi
    fi
  env:
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    DOTNET_NOLOGO: "1"
    NUGET_PACKAGES: "/home/build/.nuget/packages"

  tls_ca_env:
    - SSL_CERT_FILE  # git and other OpenSSL-linked tools in the build step

  # .NET's HttpClient/SslStream on Linux reads the system X509 trust store at
  # fixed paths — it does NOT use SSL_CERT_FILE. Appending the corporate CA to
  # the system bundle is the only reliable way to make dotnet restore trust a
  # TLS-intercepting proxy certificate.
  tls_ca_pre_step: |
    if [ -f "/home/build/.apexpack-ca.crt" ] && [ -f "/etc/ssl/certs/ca-certificates.crt" ]; then
      cat /home/build/.apexpack-ca.crt >> /etc/ssl/certs/ca-certificates.crt
    fi

  # Corporate Artifactory / Nexus NuGet feed.
  # Set to your Artifactory NuGet virtual repo URL; leave empty to restore from nuget.org directly.
  # Requires ARTI_USER / ARTI_PASSWORD decoded from the regcred docker secret.
  # Example: https://<host>/artifactory/api/nuget/nuget-virtual
  nuget_mirror_url: ""

  # NuGet.Config template to use. Built-ins: "default" (source + credentials only),
  # "corporate" (adds globalPackagesFolder + request tuning for Artifactory).
  # Custom: drop <profiles-dir>/templates/nuget/<name>.xml into your profiles repo.
  nuget_settings_template: "corporate"

image:
  # aspnet-{DOTNET_VERSION}-runtime is the ASP.NET Core runtime — no SDK, no compiler.
  # Much smaller than dotnet-{DOTNET_VERSION}-sdk and has a smaller CVE surface.
  # Wolfi package name is "aspnet-N-runtime" (not "aspnetcore-N-runtime").
  packages:
    - aspnet-{DOTNET_VERSION}-runtime
    - ca-certificates-bundle=20260413-r0
    - icu-libs
  # The entrypoint is the published DLL.
  # apexpack sets this to /app/<ProjectName>.dll at build time.
  entrypoint: /usr/bin/dotnet
  cmd:
    - "/app/app.dll"
  run-as: 65532
  ports:
    - "8080"
  env:
    ASPNETCORE_URLS: "http://+:8080"
    DOTNET_RUNNING_IN_CONTAINER: "true"
    DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "false"

scan:
  auto-patch: false
  patch-persist: false
