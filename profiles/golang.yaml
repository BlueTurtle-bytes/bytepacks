# Go language profile
# Detected when: go.mod exists in the source directory
# Builds with: go build (CGO disabled, trimpath for reproducibility)
# Runtime image: Wolfi base + ca-certificates-bundle only

runtime: golang
version: "1"
description: Go application (gin, echo, chi, stdlib, gRPC)

detect:
  files:
    - go.mod
    - main.go
  content:
    - file: go.mod
      contains: "^module "
      boost-confidence: 0.05
    - file: go.sum
      contains: "gin-gonic"
      boost-confidence: 0.02
      framework: gin
    - file: go.sum
      contains: "labstack/echo"
      boost-confidence: 0.02
      framework: echo
    - file: go.sum
      contains: "gofiber/fiber"
      boost-confidence: 0.02
      framework: fiber
    - file: go.sum
      contains: "google.golang.org/grpc"
      boost-confidence: 0.02
      framework: grpc
    - file: go.sum
      contains: "connectrpc.com/connect"
      boost-confidence: 0.02
      framework: connect
    - file: main.go
      contains: "func main"
      framework: root-main

  confidence: 0.85

build:
  dependencies:
    - busybox
    - go
    - build-base
    - git
  command: |
    mkdir -p ${{targets.destdir}}/usr/bin
    MAIN_GO=$(find . -maxdepth 4 -name "main.go" ! -path "*/vendor/*" ! -path "*_test*" | head -1)
    go build -o ${{targets.destdir}}/usr/bin/{APP_NAME} $(dirname "$MAIN_GO")
  env:
    CGO_ENABLED: "0"
    GOFLAGS: "-trimpath"
    GOPATH: "/home/build/go"
  caches:
    - /home/build/go/pkg/mod
    - /home/build/.cache/go-build

  tls_ca_env:
    - SSL_CERT_FILE  # Go crypto/tls reads this for the root CA bundle

image:
  packages:
    - ca-certificates-bundle=20260413-r0
    - brotli=1.2.0-r3
    - e2fsprogs=1.47.4-r1
    - git=2.54.0-r1
    - heimdal=7.8.0-r49
    - ncurses=6.6_p20251230-r7
    - ncurses-terminfo-base=6.6_p20251230-r7
    - openssl=3.6.3-r3
    - sqlite=3.53.2-r2
  entrypoint: /usr/bin/{APP_NAME}
  run-as: 65532
  ports:
    - "8080"

scan:
  auto-patch: false
  patch-persist: false
