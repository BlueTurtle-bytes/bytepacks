# Node.js language profile
# Detects: package.json
# Supports: Express, Fastify, NestJS, Next.js, plain Node
# Package managers: npm (default), pnpm, bun, yarn, yarn-berry
# Runtime image: Wolfi + nodejs (no npm — smaller final image)

runtime: node
version: "1"
description: Node.js application (Express, Fastify, NestJS, Next.js)

detect:
  files:
    - package.json
  package-managers:
    - file: bun.lockb
      manager: bun
    - file: bun.lock
      manager: bun
    - file: pnpm-lock.yaml
      manager: pnpm
    - file: .yarnrc.yml
      manager: yarn-berry
    - file: yarn.lock
      manager: yarn
  content:
    - file: package.json
      contains: "\"next\""
      boost-confidence: 0.05
      framework: nextjs
    - file: package.json
      contains: "\"@nestjs/core\""
      boost-confidence: 0.05
      framework: nestjs
    - file: package.json
      contains: "\"express\""
      boost-confidence: 0.03
      framework: express
    - file: package.json
      contains: "\"fastify\""
      boost-confidence: 0.03
      framework: fastify
    - file: package.json
      contains: "\"hono\""
      boost-confidence: 0.03
      framework: hono
    - file: package.json
      contains: "\"@remix-run/node\""
      boost-confidence: 0.03
      framework: remix
  confidence: 0.85

build:
  dependencies:
    - busybox
    - nodejs-{NODE_VERSION}
    - npm
    - python3
    - build-base
    - git
  # Default: npm. Installs prod deps only in final output.
  command: |
    npm ci --prefer-offline
    npm run build --if-present
    mkdir -p ${{targets.destdir}}/app
    cp -r . ${{targets.destdir}}/app/
    rm -rf ${{targets.destdir}}/app/node_modules
    cd ${{targets.destdir}}/app && npm ci --omit=dev --prefer-offline
  env:
    NODE_ENV: "production"
    NPM_CONFIG_CACHE: "/home/build/.npm"
    CI: "true"
  caches:
    - /home/build/.npm

  tls_ca_env:
    - NODE_EXTRA_CA_CERTS  # Node.js (npm, yarn, pnpm, bun) — bundled OpenSSL, not SSL_CERT_FILE
    - SSL_CERT_FILE        # curl and other OpenSSL-linked tools used in build scripts

  frameworks:
    pnpm:
      dependencies:
        - busybox
        - nodejs-{NODE_VERSION}
        - npm
        - python3
        - build-base
        - git
      command: |
        npm install -g pnpm
        pnpm install --frozen-lockfile
        pnpm run build --if-present
        mkdir -p ${{targets.destdir}}/app
        cp -r . ${{targets.destdir}}/app/
        rm -rf ${{targets.destdir}}/app/node_modules
        cd ${{targets.destdir}}/app && pnpm install --frozen-lockfile --prod
      env:
        NODE_ENV: "production"
        PNPM_HOME: "/home/build/.local/share/pnpm"
        CI: "true"
      caches:
        - /home/build/.local/share/pnpm/store

    bun:
      dependencies:
        - busybox
        - bun
        - python3
        - build-base
        - git
      command: |
        bun install --frozen-lockfile
        bun run build --if-present
        mkdir -p ${{targets.destdir}}/app
        cp -r . ${{targets.destdir}}/app/
        rm -rf ${{targets.destdir}}/app/node_modules
        cd ${{targets.destdir}}/app && bun install --frozen-lockfile --production
      env:
        NODE_ENV: "production"
        BUN_INSTALL_CACHE_DIR: "/home/build/.bun/install/cache"
        CI: "true"
      caches:
        - /home/build/.bun/install/cache

    yarn:
      command: |
        yarn install --frozen-lockfile
        yarn build --if-present
        mkdir -p ${{targets.destdir}}/app
        cp -r . ${{targets.destdir}}/app/
        rm -rf ${{targets.destdir}}/app/node_modules
        cd ${{targets.destdir}}/app && yarn install --frozen-lockfile --production
      env:
        NODE_ENV: "production"
        YARN_CACHE_FOLDER: "/home/build/.yarn/cache"
        CI: "true"
      caches:
        - /home/build/.yarn/cache

    yarn-berry:
      command: |
        yarn install --immutable
        yarn build --if-present
        mkdir -p ${{targets.destdir}}/app
        cp -r . ${{targets.destdir}}/app/
        cd ${{targets.destdir}}/app && yarn workspaces focus --production
      env:
        NODE_ENV: "production"
        YARN_CACHE_FOLDER: "/home/build/.yarn/cache"
        CI: "true"
      caches:
        - /home/build/.yarn/cache

image:
  packages:
    - nodejs-{NODE_VERSION}
    - ca-certificates-bundle=20260413-r0
  entrypoint: node
  cmd:
    - "/app/server.js"
  run-as: 65532
  ports:
    - "3000"
  env:
    NODE_ENV: "production"
    PORT: "3000"

scan:
  auto-patch: false
  patch-persist: false

test:
  packages:
    - busybox
    - nodejs-{NODE_VERSION}
  pipeline:
    - runs: |
        test -d /app || { echo "ERROR: /app directory not found"; exit 1; }
        test -f /app/package.json || { echo "ERROR: /app/package.json not found"; exit 1; }
        node --version
        echo "✓ Node app structure at /app is valid"
