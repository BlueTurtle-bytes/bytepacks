# Java language profile
# Detects Maven projects (pom.xml) and Gradle projects (build.gradle / build.gradle.kts)
# Supports: Spring Boot, Quarkus, Micronaut, plain Java
# Runtime image: Wolfi + openjdk-21-jre (JRE only — smaller attack surface than JDK)

runtime: java
version: "1"
description: Java application (Maven or Gradle, Spring Boot, Quarkus)

detect:
  files:
    - pom.xml
    - build.gradle
    - build.gradle.kts
  content:
    - file: pom.xml
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot
    - file: pom.xml
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus
    - file: pom.xml
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut
    - file: build.gradle
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot-gradle
    - file: build.gradle.kts
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot-gradle
    - file: build.gradle
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus-gradle
    - file: build.gradle.kts
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus-gradle
    - file: build.gradle
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut-gradle
    - file: build.gradle.kts
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut-gradle
  confidence: 0.85

build:
  # openjdk-{JAVA_VERSION} provides the JDK needed to compile.
  # maven is the build tool. build-base provides make, gcc etc.
  dependencies:
    - busybox
    - openjdk-{JAVA_VERSION}
    - maven
    - build-base
    - git
  # Default: plain Maven project with no detected framework.
  command: |
    [ -d "$JAVA_HOME" ] || JAVA_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-*-openjdk" -type d 2>/dev/null | head -1)
    export PATH="$JAVA_HOME/bin:$PATH"
    if [ -f "/home/build/.apexpack-truststore.p12" ]; then
      export MAVEN_OPTS="${MAVEN_OPTS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
    fi
    MVN_SETTINGS=""
    if [ -f "/home/build/.m2/settings.xml" ]; then MVN_SETTINGS="-s /home/build/.m2/settings.xml"; fi
    mvn package -DskipTests -B -q $MVN_SETTINGS
    mkdir -p ${{targets.destdir}}/app
    cp target/*.jar ${{targets.destdir}}/app/app.jar
  env:
    JAVA_HOME: "/usr/lib/jvm/java-{JAVA_VERSION}-openjdk"
    MAVEN_OPTS: "-Xmx512m -XX:+UseContainerSupport"
    GRADLE_OPTS: "-Xmx512m -XX:+UseContainerSupport"
  caches:
    - /home/build/.m2/repository

  # Corporate Artifactory / Nexus mirror for Maven.
  # Set to your actual URL; leave empty to resolve directly from Maven Central.
  # settings.xml is only injected when this is non-empty AND ARTI_USER is set
  # (decoded from the regcred docker secret by the build task).
  # Replace with your Artifactory virtual repo URL, e.g.:
  # https://<host>/artifactory/maven-virtual
  maven_mirror_url: ""

  # settings.xml template to use. Built-ins: "default" (mirrors+servers only),
  # "corporate" (adds pluginRepositories + profiles + activeProfiles).
  # Custom: drop <profiles-dir>/templates/maven/<name>.xml into your profiles repo.
  maven_settings_template: "corporate"

  tls_ca_env: []  # JVM ignores SSL_CERT_FILE; tls_ca_pre_step + build command handle it
  tls_ca_pre_step: |
    [ -f /home/build/.apexpack-ca.crt ] || exit 0
    KEYTOOL=$(find /usr/lib/jvm -name "keytool" 2>/dev/null | head -1)
    JAVA_CACERTS=$(find /usr/lib/jvm -name "cacerts" 2>/dev/null | head -1)
    if [ -z "$KEYTOOL" ]; then
      echo "ERROR: keytool not found under /usr/lib/jvm" >&2; exit 1
    fi
    if [ -z "$JAVA_CACERTS" ]; then
      echo "ERROR: cacerts not found under /usr/lib/jvm" >&2; exit 1
    fi
    # Import directly into the JVM's own cacerts so every JVM process (Gradle wrapper,
    # daemon, worker JVMs) trusts the corp CA without needing GRADLE_OPTS or JAVA_OPTS.
    # GRADLE_OPTS only covers the Gradle JVM; the wrapper may reset it before the
    # trustStore flags take effect, causing SSLHandshakeException on distribution download.
    "$KEYTOOL" -importcert -noprompt -alias apexpack-corp-ca \
      -file /home/build/.apexpack-ca.crt \
      -keystore "$JAVA_CACERTS" -storepass changeit
    # Also write a copy so the -Djavax.net.ssl.trustStore check in the build command
    # still fires as belt-and-suspenders for any process that ignores cacerts.
    STORE=/home/build/.apexpack-truststore.p12
    cp "$JAVA_CACERTS" "$STORE"
    echo "→ Truststore ready ($(basename $JAVA_CACERTS)): Java default CAs + corporate CA"

  frameworks:
    quarkus:
      # Quarkus default output is a fast-jar directory — uber-jar gives a single runnable JAR.
      command: |
        [ -d "$JAVA_HOME" ] || JAVA_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-*-openjdk" -type d 2>/dev/null | head -1)
        export PATH="$JAVA_HOME/bin:$PATH"
        if [ -f "/home/build/.apexpack-truststore.p12" ]; then
          export MAVEN_OPTS="${MAVEN_OPTS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
        fi
        MVN_SETTINGS=""
        if [ -f "/home/build/.m2/settings.xml" ]; then MVN_SETTINGS="-s /home/build/.m2/settings.xml"; fi
        mvn package -DskipTests -B -q -Dquarkus.package.jar.type=uber-jar $MVN_SETTINGS
        mkdir -p ${{targets.destdir}}/app
        cp target/*-runner.jar ${{targets.destdir}}/app/app.jar
    spring-boot-gradle:
      command: |
        [ -d "$JAVA_HOME" ] || JAVA_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-*-openjdk" -type d 2>/dev/null | head -1)
        export PATH="$JAVA_HOME/bin:$PATH"
        if [ -f "/home/build/.apexpack-truststore.p12" ]; then
          export GRADLE_OPTS="${GRADLE_OPTS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
        fi
        chmod +x ./gradlew
        ./gradlew build -x test --no-daemon -q
        mkdir -p ${{targets.destdir}}/app
        cp build/libs/*.jar ${{targets.destdir}}/app/app.jar
      caches:
        - /home/build/.gradle
    quarkus-gradle:
      command: |
        [ -d "$JAVA_HOME" ] || JAVA_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-*-openjdk" -type d 2>/dev/null | head -1)
        export PATH="$JAVA_HOME/bin:$PATH"
        if [ -f "/home/build/.apexpack-truststore.p12" ]; then
          export GRADLE_OPTS="${GRADLE_OPTS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
        fi
        chmod +x ./gradlew
        ./gradlew build -Dquarkus.package.jar.type=uber-jar -x test --no-daemon -q
        mkdir -p ${{targets.destdir}}/app
        cp build/quarkus-app/*-runner.jar ${{targets.destdir}}/app/app.jar
      caches:
        - /home/build/.gradle
    micronaut-gradle:
      command: |
        [ -d "$JAVA_HOME" ] || JAVA_HOME=$(find /usr/lib/jvm -maxdepth 1 -name "java-*-openjdk" -type d 2>/dev/null | head -1)
        export PATH="$JAVA_HOME/bin:$PATH"
        if [ -f "/home/build/.apexpack-truststore.p12" ]; then
          export GRADLE_OPTS="${GRADLE_OPTS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
        fi
        chmod +x ./gradlew
        ./gradlew build -x test --no-daemon -q
        mkdir -p ${{targets.destdir}}/app
        cp build/libs/*.jar ${{targets.destdir}}/app/app.jar
      caches:
        - /home/build/.gradle

image:
  # JRE only — not JDK. No compiler in the final image reduces attack surface.
  packages:
    - openjdk-{JAVA_VERSION}-jre
    - ca-certificates-bundle=20260413-r0
  # java -jar is the entrypoint. The JAR path is passed via cmd.
  entrypoint: java
  cmd:
    - "-jar"
    - "/app/app.jar"
  run-as: 65532
  ports:
    - "8080"
  env:
    JAVA_HOME: "/usr/lib/jvm/java-{JAVA_VERSION}-openjdk"
    JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

scan:
  auto-patch: true
  patch-persist: false
