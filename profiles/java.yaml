# Java language profile
# Detects Maven projects (pom.xml) and Gradle projects (build.gradle / build.gradle.kts)
# Supports: Spring Boot, Quarkus, Micronaut, plain Java
# Runtime image: Wolfi + openjdk-21-jre (JRE only — smaller attack surface than JDK)

runtime: java
version: "1"
description: Java application (Maven or Gradle, Spring Boot, Quarkus)

detect:
  files:
    - pom.xml
    - build.gradle
    - build.gradle.kts
  content:
    - file: pom.xml
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot
    - file: pom.xml
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus
    - file: pom.xml
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut
    - file: build.gradle
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot-gradle
    - file: build.gradle.kts
      contains: "spring-boot"
      boost-confidence: 0.05
      framework: spring-boot-gradle
    - file: build.gradle
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus-gradle
    - file: build.gradle.kts
      contains: "quarkus"
      boost-confidence: 0.05
      framework: quarkus-gradle
    - file: build.gradle
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut-gradle
    - file: build.gradle.kts
      contains: "micronaut"
      boost-confidence: 0.05
      framework: micronaut-gradle
  confidence: 0.85

build:
  # openjdk-21 provides the JDK needed to compile.
  # maven is the build tool. build-base provides make, gcc etc.
  dependencies:
    - busybox
    - openjdk-21
    - maven
    - build-base
    - git
  # Default: plain Maven project with no detected framework.
  command: |
    if [ -f "/home/build/.apexpack-truststore.p12" ]; then
      export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12"
    fi
    mvn package -DskipTests -B -q
    mkdir -p /home/build/output/app
    cp target/*.jar /home/build/output/app/app.jar
  env:
    JAVA_HOME: "/usr/lib/jvm/java-21-openjdk"
    MAVEN_OPTS: "-Xmx512m -XX:+UseContainerSupport"
    GRADLE_OPTS: "-Xmx512m -XX:+UseContainerSupport"
  caches:
    - /home/build/.m2/repository

  tls_ca_env: []  # JVM ignores SSL_CERT_FILE; tls_ca_pre_step + build command handle it
  tls_ca_pre_step: |
    # Build a PKCS12 truststore from the PEM system CA bundle + corporate CA.
    # Importing from the PEM bundle (same source SSL_CERT_FILE uses for Go) avoids
    # relying on java-cacerts format/password, which silently fails with || true and
    # leaves a truststore containing only the corporate CA — breaking all public connections.
    KEYTOOL=$(find /usr/lib/jvm -name "keytool" 2>/dev/null | head -1)
    PEM_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    if [ -z "$KEYTOOL" ]; then
      echo "ERROR: keytool not found under /usr/lib/jvm" >&2; exit 1
    fi
    if [ ! -f "$PEM_BUNDLE" ]; then
      echo "ERROR: $PEM_BUNDLE not found" >&2; exit 1
    fi
    STORE=/home/build/.apexpack-truststore.p12
    # Import corporate CA first — this creates the PKCS12 store.
    "$KEYTOOL" -importcert -noprompt -alias apexpack-corp-ca \
      -file /home/build/.apexpack-ca.crt \
      -keystore "$STORE" -storetype PKCS12 -storepass changeit
    # Split PEM bundle into individual certs and import each one.
    awk '/-----BEGIN CERTIFICATE-----/{c++; f="/tmp/pem-ca-"c".pem"} f{print>f} /-----END CERTIFICATE-----/{close(f);f=""}' "$PEM_BUNDLE"
    COUNT=0
    for f in /tmp/pem-ca-*.pem; do
      [ -f "$f" ] || continue
      "$KEYTOOL" -importcert -noprompt -alias "sys-ca-$COUNT" \
        -file "$f" -keystore "$STORE" -storetype PKCS12 -storepass changeit 2>/dev/null || true
      rm -f "$f"
      COUNT=$((COUNT+1))
    done
    echo "→ PKCS12 truststore ready: $COUNT system CAs + corporate CA"

  frameworks:
    quarkus:
      # Quarkus default output is a fast-jar directory — uber-jar gives a single runnable JAR.
      command: |
        if [ -f "/home/build/.apexpack-truststore.jks" ]; then
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
        fi
        mvn package -DskipTests -B -q -Dquarkus.package.jar.type=uber-jar
        mkdir -p /home/build/output/app
        cp target/*-runner.jar /home/build/output/app/app.jar
    spring-boot-gradle:
      command: |
        if [ -f "/home/build/.apexpack-truststore.jks" ]; then
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
        fi
        chmod +x ./gradlew
        ./gradlew build -x test --no-daemon -q
        mkdir -p /home/build/output/app
        cp build/libs/*.jar /home/build/output/app/app.jar
      caches:
        - /home/build/.gradle
    quarkus-gradle:
      command: |
        if [ -f "/home/build/.apexpack-truststore.jks" ]; then
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
        fi
        chmod +x ./gradlew
        ./gradlew build -Dquarkus.package.jar.type=uber-jar -x test --no-daemon -q
        mkdir -p /home/build/output/app
        cp build/quarkus-app/*-runner.jar /home/build/output/app/app.jar
      caches:
        - /home/build/.gradle
    micronaut-gradle:
      command: |
        if [ -f "/home/build/.apexpack-truststore.jks" ]; then
          export JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS} -Djavax.net.ssl.trustStore=/home/build/.apexpack-truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
        fi
        chmod +x ./gradlew
        ./gradlew build -x test --no-daemon -q
        mkdir -p /home/build/output/app
        cp build/libs/*.jar /home/build/output/app/app.jar
      caches:
        - /home/build/.gradle

image:
  # JRE only — not JDK. No compiler in the final image reduces attack surface.
  packages:
    - openjdk-21-jre
    - ca-certificates-bundle=20260413-r0
  # java -jar is the entrypoint. The JAR path is passed via cmd.
  entrypoint: java
  cmd:
    - "-jar"
    - "/app/app.jar"
  run-as: 65532
  ports:
    - "8080"
  env:
    JAVA_HOME: "/usr/lib/jvm/java-21-openjdk"
    JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

scan:
  auto-patch: true
  patch-persist: false
