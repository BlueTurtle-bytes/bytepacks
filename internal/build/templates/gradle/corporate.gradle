// Gradle init script written by apexpacks (corporate profile).
// Routes all repository resolution through Artifactory and handles
// Gradle 7+ dependencyResolutionManagement in settings.gradle.
def artUser = System.getenv("ARTI_USER") ?: ""
def artPassword = System.getenv("ARTI_PASSWORD") ?: ""
def mirrorUrl = "{{GRADLE_MIRROR_URL}}"

def apexpackMirror = { repos ->
    repos.maven {
        url mirrorUrl
        credentials { username artUser; password artPassword }
    }
}

settingsEvaluated { settings ->
    settings.pluginManagement {
        repositories { apexpackMirror(delegate) }
    }
    // Gradle 7+: configure dependencyResolutionManagement if the project uses it
    if (settings.metaClass.respondsTo(settings, 'getDependencyResolutionManagement')) {
        try {
            settings.dependencyResolutionManagement {
                repositories { apexpackMirror(delegate) }
            }
        } catch (ignored) {}
    }
}

allprojects {
    buildscript {
        repositories { apexpackMirror(delegate) }
    }
    repositories { apexpackMirror(delegate) }
}
